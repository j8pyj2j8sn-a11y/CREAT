<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WE CREATE • Game Music</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:#050505;

color:#fff;

overflow-x:hidden;

}

/* Background */

body::before{

content:"";

position:fixed;

inset:0;

background:

linear-gradient(

180deg,

rgba(0,0,0,.95),

rgba(0,0,0,.75),

rgba(0,0,0,.35),

rgba(0,0,0,.95)

);

z-index:-2;

}

.bg{

position:fixed;

inset:0;

background:

radial-gradient(circle at top,#222,#050505 70%);

transition:1s;

z-index:-3;

}

/* Header */

header{

position:fixed;

top:0;

left:0;

width:100%;

padding:22px 60px;

display:flex;

justify-content:space-between;

align-items:center;

backdrop-filter:blur(20px);

background:rgba(0,0,0,.18);

z-index:1000;

}

.logo{

font-size:28px;

font-weight:800;

letter-spacing:2px;

}

.logo span{

color:#00E5FF;

}

nav{

display:flex;

gap:35px;

}

nav a{

color:white;

text-decoration:none;

font-weight:500;

transition:.3s;

}

nav a:hover{

color:#00E5FF;

}

/* Hero */

.hero{

padding-top:150px;

text-align:center;

padding-bottom:60px;

}

.hero h4{

letter-spacing:5px;

color:#00E5FF;

font-size:14px;

margin-bottom:20px;

}

.hero h1{

font-size:85px;

font-weight:900;

line-height:.9;

}

.hero h1 span{

display:block;

color:#d8d8d8;

}

.hero p{

margin:auto;

margin-top:25px;

max-width:720px;

font-size:19px;

line-height:1.8;

color:#c5c5c5;

}

/* Music Section */

.music{

padding:0 60px 140px;

}

.music h2{

font-size:28px;

margin-bottom:25px;

}

.card{

display:flex;

align-items:center;

gap:18px;

padding:18px;

margin-bottom:18px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

border-radius:24px;

backdrop-filter:blur(20px);

transition:.35s;

cursor:pointer;

position:relative;

overflow:hidden;

}

.card:hover{

transform:translateY(-3px);

background:rgba(255,255,255,.08);

}
  /* RGB Animated Border */

.card::before{

content:"";

position:absolute;

inset:0;

padding:1px;

border-radius:24px;

background:linear-gradient(

90deg,

#00eaff,

#4d7cff,

#9b5cff,

#ff2f92,

#00eaff

);

background-size:300%;

animation:rgbBorder 6s linear infinite;

-webkit-mask:

linear-gradient(#fff 0 0) content-box,

linear-gradient(#fff 0 0);

-webkit-mask-composite:xor;

pointer-events:none;

}

/* Album Cover */

.card img{

transition:.4s;

}

.card:hover img{

transform:scale(1.08);

}

/* Download Button */

.download{

box-shadow:

0 0 12px rgba(0,229,255,.25);

}

.download:hover{

box-shadow:

0 0 25px #00E5FF;

}

/* Equalizer */

.equalizer{

display:flex;

gap:4px;

align-items:flex-end;

height:24px;

margin-right:18px;

opacity:0;

transition:.3s;

}

.equalizer span{

width:4px;

border-radius:20px;

background:#00E5FF;

animation:equalizer .8s infinite alternate;

}

.equalizer span:nth-child(1){

height:8px;

}

.equalizer span:nth-child(2){

height:20px;

animation-delay:.2s;

}

.equalizer span:nth-child(3){

height:14px;

animation-delay:.4s;

}

.card.active .equalizer{

opacity:1;

}

/* Animations */

@keyframes rgbBorder{

0%{

background-position:0%;

}

100%{

background-position:300%;

}

}

@keyframes equalizer{

from{

transform:scaleY(.5);

}

to{

transform:scaleY(1.5);

}

}

.card img{

width:75px;

height:75px;

border-radius:18px;

object-fit:cover;

}

.info{

flex:1;

}

.info h3{

font-size:21px;

margin-bottom:6px;

}

.info p{

color:#bfbfbf;

}

.download{

width:44px;

height:44px;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

background:rgba(255,255,255,.08);

font-size:22px;

transition:.3s;

}

.download:hover{

background:#00E5FF;

color:black;

transform:scale(1.08);

}

/* Search */

.search{

position:fixed;

bottom:25px;

left:50%;

transform:translateX(-50%);

width:min(700px,92%);

}

.search input{

width:100%;

padding:18px 22px;

border:none;

outline:none;

border-radius:50px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

color:white;

font-size:17px;

}

.search input::placeholder{

color:#bbb;

}

/* Mobile */

@media(max-width:768px){

header{

padding:20px;

}

nav{

display:none;

}

.hero h1{

font-size:55px;

}

.hero p{

font-size:16px;

padding:0 20px;

}

.music{

padding:0 20px 120px;

}

.card img{

width:60px;

height:60px;

}

}

</style>

</head>

<body>

<div class="bg"></div>

<header>

<div class="logo">

WE <span>CREATE</span>

</div>

<nav>

<a href="#">Home</a>

<a href="#">Game Music</a>

<a href="#">NCS</a>

<a href="#">Troll Wallet</a>

</nav>

</header>

<section class="hero">

<h4>

DISCOVER • LISTEN • DOWNLOAD

</h4>

<h1>

GAME

<span>MUSIC</span>

</h1>

<p>

Explore a premium collection of cinematic game music, ambient soundtracks, royalty-free audio and immersive background tracks.

</p>

</section>

<section class="music">

<h2>Latest Tracks</h2>

<div class="card">

<img src="covers/cover1.jpg">

<div class="info">

<h3>Midnight Echo</h3>

<p>Lounge Music • 03:42</p>

</div>

<div class="download">⬇</div>

</div>

</section>

<div class="search">

<input type="text" placeholder="Search music...">

</div>

</body>

</html>
