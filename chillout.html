<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOUNGE MUSIC</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --silver: #c0c0c0; }
        
        body { 
            margin: 0; background: #050505; color: white; 
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column; 
            align-items: center; min-height: 100vh; overflow: hidden;
        }

        /* Dynamic Background Light */
        #bg-light {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('../../COVER/album_cover.jpg') center/cover;
            filter: blur(100px) brightness(0.3); opacity: 0; transition: opacity 1s ease; z-index: -1;
        }
        .playing + #bg-light { opacity: 1; }

        nav { width: 100%; padding: 30px; position: absolute; }
        nav a { color: white; text-decoration: none; font-weight: 200; letter-spacing: 2px; }

        h1 { font-size: 8vw; margin-top: 10vh; text-transform: uppercase; letter-spacing: -5px; }

        #disc { 
            width: 250px; height: 250px; border-radius: 50%; 
            background: url('../../COVER/album_cover.jpg') center/cover;
            border: 4px solid #333; transition: all 0.5s ease;
        }
        .playing { animation: rotate 8s linear infinite; border-color: var(--silver); box-shadow: 0 0 40px var(--silver); }

        /* Glass Bar */
        .glass-bar {
            width: 90%; max-width: 500px; background: var(--glass);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 50px; display: flex;
            align-items: center; justify-content: space-between; gap: 20px;
            position: fixed; bottom: 30px;
        }

        /* Buttons */
        button { background: none; border: none; color: white; cursor: pointer; font-size: 20px; }
        .play-main { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #555; background: #000; }
        .playing-glow { box-shadow: 0 0 20px 5px rgba(192, 192, 192, 0.4); border-color: #fff; }

        /* Liquid Glass Playlist */
        #playlist {
            position: fixed; bottom: -100%; width: 100%; height: 60%;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px 40px 0 0;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        #playlist.active { bottom: 0; }
        .close-arrow { text-align: center; font-size: 30px; cursor: pointer; padding: 10px; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="bg-light"></div>
    <nav><a href="../../index.html">WE CREATE</a></nav>
    <h1>LOUNGE MUSIC</h1>

    <div id="disc"></div>

    <div class="glass-bar">
        <button onclick="togglePlaylist()">📂</button>
        <button id="prevBtn">⏮</button>
        <button class="play-main" id="mainPlayBtn" onclick="togglePlay()">▶</button>
        <button id="nextBtn">⏭</button>
        <button>⬇</button>
    </div>

    <div id="playlist">
        <div class="close-arrow" onclick="togglePlaylist()">⌄</div>
        <div id="song-list"></div>
    </div>

    <script>
        const disc = document.getElementById('disc');
        const playBtn = document.getElementById('mainPlayBtn');
        const bg = document.getElementById('bg-light');
        const list = document.getElementById('song-list');

        for(let i=1; i<=50; i++) {
            list.innerHTML += `<p style="padding:15px; border-bottom:1px solid rgba(255,255,255,0.1); text-align:center;">MUSIC ${i}</p>`;
        }

        function togglePlay() {
            disc.classList.toggle('playing');
            playBtn.classList.toggle('playing-glow');
            playBtn.innerText = disc.classList.contains('playing') ? "⏸" : "▶";
            
            // Sync background visibility with playing status
            bg.style.opacity = disc.classList.contains('playing') ? "1" : "0";
        }

        function togglePlaylist() { document.getElementById('playlist').classList.toggle('active'); }
    </script>
</body>
</html>
