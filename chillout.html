<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LOUNGE MUSIC</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --silver: #c0c0c0; }
        
        body { 
            margin: 0; background: #050505; color: white; 
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column; 
            align-items: center; min-height: 100vh; overflow: hidden;
            transition: background 0.8s ease;
        }

        nav { width: 100%; padding: 40px; position: absolute; }
        nav a { color: white; text-decoration: none; font-weight: 200; letter-spacing: 2px; }

        h1 { font-size: 120px; margin-top: 100px; text-transform: uppercase; letter-spacing: -5px; }

        /* Updated path for cover image */
        #disc { 
            width: 220px; height: 220px; border-radius: 50%; 
            background: url('../../COVER/album_cover.jpg') center/cover;
            border: 4px solid #333; margin: 40px 0;
        }
        .playing { animation: rotate 8s linear infinite; border-color: var(--silver); box-shadow: 0 0 40px var(--silver); }

        .glass-bar {
            width: 80%; max-width: 900px; background: var(--glass);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 40px; border-radius: 50px; display: flex;
            align-items: center; justify-content: center; gap: 40px;
        }

        /* Premium RGB Glow Button */
        .play-btn {
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid #555;
            background: #000; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.4s;
        }
        .playing-glow { box-shadow: 0 0 20px 5px rgba(192, 192, 192, 0.6); border-color: #fff; }

        .btn { color: #aaa; cursor: pointer; font-size: 14px; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { color: white; }

        #playlist {
            position: fixed; bottom: -100%; width: 100%; height: 50%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(40px);
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 50px; box-sizing: border-box; overflow-y: auto; border-top: 1px solid #333;
        }
        #playlist.active { bottom: 0; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav><a href="../../index.html">WE CREATE</a></nav>
    <h1>LOUNGE MUSIC</h1>

    <div id="disc"></div>

    <div class="glass-bar" id="player-bar">
        <div class="btn" id="prevBtn">PREVIOUS</div>
        <button class="play-btn" id="mainPlayBtn" onclick="togglePlay()"><span id="icon">▶</span></button>
        <div class="btn" id="nextBtn">NEXT</div>
        <div class="btn" onclick="togglePlaylist()">PLAYLIST</div>
        <div class="btn">DOWNLOAD</div>
    </div>

    <div id="playlist">
        <h2 onclick="togglePlaylist()" style="cursor:pointer; color: #666;">✕ CLOSE</h2>
        <div id="song-list"></div>
    </div>

    <script>
        const disc = document.getElementById('disc');
        const bar = document.getElementById('player-bar');
        const playBtn = document.getElementById('mainPlayBtn');

        // Populate 50 songs pointing to the MUSIC folder
        const list = document.getElementById('song-list');
        for(let i=1; i<=50; i++) {
            list.innerHTML += `<p style="padding:15px; border-bottom:1px solid #222; cursor:pointer;">
                <a href="../../MUSIC/music${i}.mp3" style="text-decoration:none; color:white;">MUSIC ${i}</a>
            </p>`;
        }

        function togglePlay() {
            disc.classList.toggle('playing');
            playBtn.classList.toggle('playing-glow');
            document.getElementById('icon').innerText = disc.classList.contains('playing') ? "⏸" : "▶";
            bar.style.boxShadow = disc.classList.contains('playing') ? "0 0 30px rgba(192, 192, 192, 0.2)" : "none";
        }

        function togglePlaylist() { document.getElementById('playlist').classList.toggle('active'); }
    </script>
</body>
</html>
