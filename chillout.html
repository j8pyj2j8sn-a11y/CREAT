<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LOUNGE MUSIC</title>
    <style>
        :root { --bg-color: #1a1a1a; --accent-color: #ff3e3e; }
        body { 
            margin: 0; background: var(--bg-color); color: white; 
            font-family: 'Segoe UI', sans-serif; transition: background 1s ease;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* Nav */
        nav { width: 100%; padding: 30px 50px; position: absolute; }
        nav a { color: white; text-decoration: none; font-weight: 300; }

        h1 { font-size: 120px; margin-top: 100px; text-transform: uppercase; letter-spacing: -5px; }

        /* Disc */
        #disc { 
            width: 200px; height: 200px; border-radius: 50%; 
            background: url('your-cover-image.jpg') center/cover;
            border: 6px solid #333; transition: transform 0.1s linear;
        }
        .playing { animation: rotate 5s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* RGB Border Button */
        .play-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: #000; border: 4px solid transparent;
            background-image: linear-gradient(#000, #000), linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
            background-origin: border-box; background-clip: padding-box, border-box;
            margin-top: 50px; cursor: pointer; color: white;
        }

        /* Glass Playlist */
        #playlist {
            position: fixed; bottom: -100%; width: 100%; height: 60%;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            transition: bottom 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow-y: auto; padding: 40px; box-sizing: border-box;
        }
        #playlist.active { bottom: 0; }
    </style>
</head>
<body>

    <nav><a href="index.html">WE CREATE</a></nav>
    <h1>LOUNGE MUSIC</h1>

    <div id="disc"></div>

    <button class="play-btn" onclick="togglePlayback()">▶</button>

    <div id="playlist">
        <h2 onclick="hidePlaylist()" style="cursor:pointer">▼ Close Playlist</h2>
        <div id="song-list"></div>
    </div>

    <script>
        // Generate 50 songs
        const list = document.getElementById('song-list');
        for(let i=1; i<=50; i++) {
            list.innerHTML += `<p style="padding:10px; border-bottom:1px solid #333">Music ${i}</p>`;
        }

        function togglePlayback() {
            document.getElementById('disc').classList.toggle('playing');
        }
        
        function hidePlaylist() { document.getElementById('playlist').classList.remove('active'); }
        
        // Example: Set dynamic background and disc image
        function setAlbum(color, imgUrl) {
            document.body.style.backgroundColor = color;
            document.getElementById('disc').style.backgroundImage = `url('${imgUrl}')`;
        }
    </script>
</body>
</html>
