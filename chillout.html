<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOUNGE MUSIC</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --silver-border: 1px solid rgba(192, 192, 192, 0.6); }
        
        body { 
            margin: 0; background: #050505; color: white; 
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 100vh; overflow: hidden;
        }

        /* Fixed Background Path */
        #bg-light {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('chillout.jpg');
            background-size: cover; background-position: center;
            filter: blur(80px) brightness(0.4); opacity: 0; transition: opacity 1.5s ease; z-index: -1;
        }
        .playing + #bg-light { opacity: 1; }

        nav { width: 100%; padding: 50px 80px; position: absolute; top: 0; box-sizing: border-box; }
        nav a { color: white; text-decoration: none; font-weight: 300; letter-spacing: 3px; font-size: 20px; }

        h1 { font-size: 120px; margin: 0; text-transform: uppercase; letter-spacing: -5px; }

        /* Disc Centered */
        #disc { 
            width: 250px; height: 250px; border-radius: 50%; 
            background: url('../../COVER/album_cover.jpg') center/cover;
            border: 4px solid #333; transition: all 0.5s ease;
            margin: 50px 0;
        }
        .playing { animation: rotate 8s linear infinite; border-color: #fff; box-shadow: 0 0 40px rgba(255,255,255,0.2); }

        /* Buttons with more space */
        .glass-bar {
            width: auto; max-width: 90%; background: var(--glass);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 40px; border-radius: 50px; display: flex;
            align-items: center; justify-content: center; gap: 30px; /* Increased gap */
            position: fixed; bottom: 40px;
        }

        .btn-tablet {
            height: 50px; min-width: 60px; border-radius: 25px;
            background: rgba(0,0,0,0.3);
            border: var(--silver-border); color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center; 
            font-size: 20px; font-weight: bold; transition: 0.3s;
        }
        .btn-tablet:hover { background: rgba(255,255,255,0.1); }
        .btn-tablet:active { transform: scale(0.95); }

        #playlist {
            position: fixed; bottom: -100%; width: 100%; height: 60%;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255,255,255,0.2); border-radius: 40px 40px 0 0;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 20px; overflow-y: auto; z-index: 100;
        }
        #playlist.active { bottom: 0; }
        .handle { width: 50px; height: 5px; background: #fff; margin: 10px auto 30px; border-radius: 5px; cursor: pointer; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="bg-light"></div>
    <nav><a href="../../index.html">WE CREATE</a></nav>
    <h1>LOUNGE MUSIC</h1>

    <div id="disc"></div>

    <div class="glass-bar">
        <button class="btn-tablet" onclick="togglePlaylist()">≡</button>
        <button class="btn-tablet">&lt;</button>
        <button class="btn-tablet" id="mainPlayBtn" onclick="togglePlay()">▶</button>
        <button class="btn-tablet">&gt;</button>
        <button class="btn-tablet">↓</button>
    </div>

    <div id="playlist">
        <div class="handle" onclick="togglePlaylist()"></div>
        <div id="song-list"></div>
    </div>

    <script>
        const disc = document.getElementById('disc');
        const playBtn = document.getElementById('mainPlayBtn');
        const list = document.getElementById('song-list');

        for(let i=1; i<=50; i++) {
            list.innerHTML += `<p style="padding:15px; border-bottom:1px solid rgba(255,255,255,0.1); text-align:center;">MUSIC ${i}</p>`;
        }

        function togglePlay() {
            disc.classList.toggle('playing');
            playBtn.innerText = disc.classList.contains('playing') ? "||" : "▶";
        }

        function togglePlaylist() { document.getElementById('playlist').classList.toggle('active'); }
    </script>
</body>
</html>
