<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LOUNGE MUSIC</title>
    <style>
        :root { --accent-color: #ff3e3e; }
        
        body { 
            margin: 0; background: #0a0a0a; color: white; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Top Bar */
        .nav-bar { 
            width: 100%; padding: 30px; display: flex; justify-content: space-between; 
            position: absolute; z-index: 10;
        }
        .nav-bar a { color: white; text-decoration: none; font-size: 18px; font-weight: 300; }
        .menu-icon { cursor: pointer; }

        /* Main Title */
        h1 { 
            font-size: 120px; margin-top: 15vh; opacity: 0; 
            animation: fadeIn 1.5s ease-out forwards; text-transform: uppercase;
        }

        /* Record Player */
        .record-container { 
            width: 400px; height: 400px; border-radius: 50%; 
            background: url('https://images.unsplash.com/photo-1558981403-c5f9899a28bc?q=80&w=500') center/cover;
            border: 8px solid #1a1a1a; box-shadow: 0 0 0px var(--accent-color);
            transition: all 0.5s ease;
        }
        .playing { animation: rotate 4s linear infinite; box-shadow: 0 0 40px var(--accent-color); }

        /* Music Card (Glassmorphism) */
        .music-card { 
            position: absolute; bottom: 20px; width: 90%; max-width: 800px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Controls */
        .controls { display: flex; justify-content: center; gap: 30px; align-items: center; margin-top: 20px; }
        .progress-bar { height: 4px; background: #333; border-radius: 2px; margin-top: 10px; }
        .progress { height: 100%; background: var(--accent-color); width: 40%; border-radius: 2px; }

        /* Playlist Drawer */
        #playlist-bar { 
            position: fixed; bottom: -100%; width: 100%; height: 40%; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(30px);
            transition: bottom 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            display: flex; flex-direction: column; padding: 40px;
        }
        #playlist-bar.active { bottom: 0; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes fadeIn { to { opacity: 0.8; } }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="index.html">WE CREATE</a>
        <div class="menu-icon">☰</div>
    </nav>

    <h1>LOUNGE MUSIC</h1>

    <div id="disc" class="record-container"></div>

    <div class="music-card">
        <h3>Midnight Drive</h3>
        <div class="progress-bar"><div class="progress"></div></div>
        <div class="controls">
            <button onclick="togglePlay()">Play/Pause</button>
            <button onclick="togglePlaylist()">Playlist</button>
            <button>Download</button>
        </div>
    </div>

    <div id="playlist-bar">
        <h2>Your Playlist</h2>
        <p>1. Midnight Drive - Noir Waves</p>
        <p>2. Late Night City - Neon Soul</p>
    </div>

    <script>
        function togglePlay() {
            document.getElementById('disc').classList.toggle('playing');
        }
        function togglePlaylist() {
            document.getElementById('playlist-bar').classList.toggle('active');
        }
    </script>
</body>
</html>
