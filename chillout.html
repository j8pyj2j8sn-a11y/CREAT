<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LOUNGE MUSIC</title>
    <style>
        :root { --accent-color: #ff3e3e; }
        body { margin: 0; background: #0a0a0a; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }

        /* Navigation */
        .nav-bar { width: 100%; padding: 30px; display: flex; justify-content: space-between; position: absolute; z-index: 10; }
        .nav-bar a { color: white; text-decoration: none; font-weight: 300; }

        /* Layout */
        h1 { font-size: 80px; margin-top: 80px; text-transform: uppercase; letter-spacing: -2px; }
        
        /* Smaller Disc */
        .record-container { 
            width: 250px; height: 250px; border-radius: 50%; 
            background: url('https://images.unsplash.com/photo-1558981403-c5f9899a28bc') center/cover;
            border: 6px solid #1a1a1a; transition: all 0.5s ease;
        }
        .playing { animation: rotate 4s linear infinite; box-shadow: 0 0 30px var(--accent-color); }

        /* Transparent Glass Music Card */
        .music-card { 
            position: absolute; bottom: 20px; width: 90%; max-width: 600px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }

        /* Transparent Progress Bar */
        .progress-container { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; cursor: pointer; margin: 15px 0; }
        .progress-bar { height: 100%; background: var(--accent-color); width: 30%; border-radius: 3px; }

        /* Controls */
        .controls { display: flex; justify-content: center; gap: 40px; align-items: center; }
        button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }

        /* Playlist Drawer */
        #playlist-bar { 
            position: fixed; bottom: -100%; width: 100%; height: 50%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            transition: bottom 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            padding: 40px; box-sizing: border-box; border-top: 1px solid #333;
        }
        #playlist-bar.active { bottom: 0; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="index.html">WE CREATE</a>
    </nav>

    <h1>LOUNGE MUSIC</h1>

    <div id="disc" class="record-container"></div>

    <div class="music-card">
        <div class="progress-container"><div class="progress-bar"></div></div>
        <div class="controls">
            <button id="prevBtn">⏮</button>
            <button onclick="togglePlay()">Play/Pause</button>
            <button id="nextBtn">⏭</button>
            <button onclick="togglePlaylist()">☰</button>
        </div>
    </div>

    <div id="playlist-bar" onclick="togglePlaylist()">
        <h2>Playlist</h2>
        <p>1. Midnight Drive</p>
        <p>2. Neon Waves</p>
    </div>

    <script>
        let seekInterval;
        const disc = document.getElementById('disc');
        
        function togglePlay() { disc.classList.toggle('playing'); }
        function togglePlaylist() { document.getElementById('playlist-bar').classList.toggle('active'); }

        // Hold to Seek Logic
        function startSeeking(direction) {
            seekInterval = setInterval(() => {
                console.log(direction === 'forward' ? "Seeking Forward..." : "Seeking Backward...");
                // Add logic: audio.currentTime += (direction === 'forward' ? 1 : -1);
            }, 200);
        }

        function stopSeeking() { clearInterval(seekInterval); }

        document.getElementById('nextBtn').addEventListener('mousedown', () => startSeeking('forward'));
        document.getElementById('nextBtn').addEventListener('mouseup', stopSeeking);
        document.getElementById('prevBtn').addEventListener('mousedown', () => startSeeking('backward'));
        document.getElementById('prevBtn').addEventListener('mouseup', stopSeeking);
    </script>
</body>
</html>
