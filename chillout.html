<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LOUNGE MUSIC</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --silver: #c0c0c0; }
        
        body { 
            margin: 0; background: #050505; color: white; 
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column; 
            align-items: center; min-height: 100vh; overflow: hidden;
        }

        /* Top Nav */
        nav { width: 100%; padding: 40px; position: absolute; }
        nav a { color: white; text-decoration: none; font-weight: 200; letter-spacing: 2px; }

        /* Title */
        h1 { font-size: 120px; margin-top: 120px; text-transform: uppercase; letter-spacing: -5px; }

        /* Disc */
        #disc { 
            width: 220px; height: 220px; border-radius: 50%; 
            background: url('https://images.unsplash.com/photo-1558981403-c5f9899a28bc') center/cover;
            border: 4px solid #333; margin: 40px 0;
        }
        .playing { animation: rotate 8s linear infinite; border-color: var(--silver); box-shadow: 0 0 30px var(--silver); }

        /* Premium Glass Bar */
        .glass-bar {
            width: 80%; max-width: 900px; background: var(--glass);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 40px; border-radius: 50px; display: flex;
            align-items: center; justify-content: space-between; gap: 30px;
        }

        /* RGB Glowing Play Button */
        .play-btn {
            width: 70px; height: 70px; border-radius: 50%; border: 3px solid transparent;
            background: linear-gradient(#000, #000) padding-box, 
                        linear-gradient(45deg, #c0c0c0, #333, #c0c0c0) border-box;
            cursor: pointer; transition: 0.3s;
        }
        .playing + .play-btn { box-shadow: 0 0 20px #888; border-color: #fff; }

        /* Buttons */
        .btn { color: #888; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn:hover { color: white; }

        /* Playlist Drawer */
        #playlist {
            position: fixed; bottom: -100%; width: 100%; height: 50%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(30px);
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 50px; box-sizing: border-box; overflow-y: auto;
        }
        #playlist.active { bottom: 0; }
    </style>
</head>
<body>

    <nav><a href="index.html">WE CREATE</a></nav>
    <h1>LOUNGE MUSIC</h1>

    <div id="disc"></div>

    <div class="glass-bar" id="player-bar">
        <div class="btn" onclick="prev()">PREV</div>
        <button class="play-btn" onclick="togglePlay()"></button>
        <div class="btn" onclick="next()">NEXT</div>
        <div class="btn" onclick="togglePlaylist()">PLAYLIST</div>
        <div class="btn">DOWNLOAD</div>
    </div>

    <div id="playlist">
        <h2 onclick="togglePlaylist()" style="cursor:pointer">✕ Close</h2>
        <div id="song-list"></div>
    </div>

    <script>
        const disc = document.getElementById('disc');
        const list = document.getElementById('song-list');
        const bar = document.getElementById('player-bar');

        // Populate 50 songs
        for(let i=1; i<=50; i++) {
            list.innerHTML += `<p style="padding:15px; border-bottom:1px solid #222">MUSIC ${i}</p>`;
        }

        function togglePlay() {
            disc.classList.toggle('playing');
            bar.style.boxShadow = disc.classList.contains('playing') ? "0 0 20px rgba(192, 192, 192, 0.3)" : "none";
        }

        function togglePlaylist() { document.getElementById('playlist').classList.toggle('active'); }
        function next() { /* Add skip logic */ }
        function prev() { /* Add back logic */ }
    </script>
</body>
</html>
