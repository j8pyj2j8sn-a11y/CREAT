<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOUNGE MUSIC</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --silver: #c0c0c0; }
        
        body { 
            margin: 0; background: #050505; color: white; 
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column; 
            align-items: center; min-height: 100vh; overflow: hidden;
        }

        nav { width: 100%; padding: 30px; position: absolute; }
        nav a { color: white; text-decoration: none; font-weight: 200; letter-spacing: 2px; }

        h1 { font-size: 8vw; margin-top: 10vh; text-transform: uppercase; letter-spacing: -3px; text-align: center; }

        #disc { 
            width: 250px; height: 250px; border-radius: 50%; 
            background: url('../../COVER/album_cover.jpg') center/cover;
            border: 4px solid #333; margin: 5vh 0;
            transition: all 0.5s ease;
        }
        .playing { animation: rotate 8s linear infinite; border-color: var(--silver); box-shadow: 0 0 40px var(--silver); }

        /* Responsive Controls Bar */
        .glass-bar {
            width: 90%; max-width: 600px; background: var(--glass);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 50px; display: flex;
            align-items: center; justify-content: space-between; gap: 15px;
            position: fixed; bottom: 30px;
        }

        .play-btn {
            width: 65px; height: 65px; border-radius: 50%; border: 2px solid #555;
            background: #000; cursor: pointer; flex-shrink: 0;
            transition: 0.4s; display: flex; align-items: center; justify-content: center;
        }
        .playing-glow { box-shadow: 0 0 20px 5px rgba(192, 192, 192, 0.6); border-color: #fff; }

        .btn { color: #aaa; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; white-space: nowrap; }

        /* Playlist Drawer */
        #playlist {
            position: fixed; bottom: -100%; width: 100%; height: 60%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(40px);
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 40px; box-sizing: border-box; overflow-y: auto;
        }
        #playlist.active { bottom: 0; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 60px; }
            #disc { width: 180px; height: 180px; }
            .glass-bar { padding: 10px; gap: 10px; }
            .btn { font-size: 10px; }
        }
    </style>
</head>
<body>

    <nav><a href="../../index.html">WE CREATE</a></nav>
    <h1>LOUNGE MUSIC</h1>

    <div id="disc"></div>

    <div class="glass-bar">
        <div class="btn" onclick="togglePlaylist()">Playlist</div>
        <div class="btn" id="prevBtn">Prev</div>
        <button class="play-btn" id="mainPlayBtn" onclick="togglePlay()">▶</button>
        <div class="btn" id="nextBtn">Next</div>
        <div class="btn">Download</div>
    </div>

    <div id="playlist">
        <h2 onclick="togglePlaylist()" style="cursor:pointer">✕ CLOSE</h2>
        <div id="song-list"></div>
    </div>

    <script>
        const disc = document.getElementById('disc');
        const playBtn = document.getElementById('mainPlayBtn');
        const list = document.getElementById('song-list');

        for(let i=1; i<=50; i++) {
            list.innerHTML += `<p style="padding:15px; border-bottom:1px solid #333;">MUSIC ${i}</p>`;
        }

        function togglePlay() {
            disc.classList.toggle('playing');
            playBtn.classList.toggle('playing-glow');
            playBtn.innerText = disc.classList.contains('playing') ? "⏸" : "▶";
        }

        function togglePlaylist() { document.getElementById('playlist').classList.toggle('active'); }
    </script>
</body>
</html>
