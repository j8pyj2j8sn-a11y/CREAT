<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATORS SPACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('creator.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Fixed Top Border Bar */
        .top-bar {
            height: 70px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Title fade animation */
        #main-title {
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .silver-rgb-border {
            position: relative;
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .silver-rgb-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(90deg, #ec4899, #8b5cf6, #06b6d4, #ec4899);
            z-index: -1;
            border-radius: 9999px;
            animation: rotate 3s linear infinite;
        }

        #player-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-border-spin { animation: rotate 3s linear infinite; }
    </style>
</head>
<body class="text-white font-sans">

    <!-- Top Border Bar -->
    <nav class="top-bar">
        <div class="text-xl font-bold tracking-widest">WE CREATE</div>
        <button class="silver-rgb-border px-6 py-2 rounded-full text-xs font-semibold hover:bg-white/10 transition-all">
            GO BACK
        </button>
    </nav>

    <!-- Trigger element to detect scroll -->
    <div id="scroll-trigger" class="h-1"></div>

    <header id="main-title" class="max-w-7xl mx-auto mt-10 mb-10 px-6">
        <h1 class="text-[110px] font-black tracking-tighter opacity-90 leading-[0.9]">
            CREATORS<br>SPACE
        </h1>
    </header>

    <main id="player-container" class="space-y-4 px-6">
    </main>

    <script>
        // Smooth fade out logic
        const observer = new IntersectionObserver((entries) => {
            const title = document.getElementById('main-title');
            if (!entries[0].isIntersecting) {
                title.style.opacity = '0';
                title.style.transform = 'translateY(-20px)';
            } else {
                title.style.opacity = '1';
                title.style.transform = 'translateY(0)';
            }
        }, { threshold: 0.1 });

        observer.observe(document.getElementById('scroll-trigger'));

        // Generate songs
        const songs = Array.from({length: 50}, (_, i) => `Soundscape Track ${i + 1}`);
        const container = document.getElementById('player-container');
        songs.forEach((song) => {
            const card = document.createElement('div');
            card.className = "glass-card p-6 rounded-3xl flex items-center justify-between hover:bg-white/5 transition-all cursor-pointer";
            card.innerHTML = `
                <div class="flex items-center gap-6">
                    <div class="w-16 h-16 rounded-2xl bg-black/40 shadow-inner"></div>
                    <span class="text-xl font-medium tracking-wide">${song}</span>
                </div>
                <div class="relative p-[2px] rounded-full overflow-hidden shrink-0">
                    <div class="absolute inset-0 bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 animate-border-spin"></div>
                    <button class="relative w-14 h-14 flex items-center justify-center rounded-full bg-[#0a0a0a] hover:bg-black transition-colors">
                        <svg class="w-7 h-7 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                    </button>
                </div>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
