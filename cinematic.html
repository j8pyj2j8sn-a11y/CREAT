<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATORS SPACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Liquid Glass Blur Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Smooth RGB Rotation for Download Button */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-border-spin {
            animation: rotate 3s linear infinite;
        }
    </style>
</head>
<body class="bg-[#0f0f12] text-white min-h-screen p-4 md:p-8 font-sans">

    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[400px] h-[400px] bg-purple-900/20 blur-[100px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-blue-900/20 blur-[100px] rounded-full"></div>
    </div>

    <header class="max-w-2xl mx-auto mb-10">
        <h1 class="text-xl font-light tracking-[0.2em] opacity-90">CREATORS SPACE</h1>
    </header>

    <main id="player-container" class="max-w-2xl mx-auto space-y-4">
        </main>

    <script>
        const songs = ["Astral Echoes", "Midnight Neon", "Oceanic Flow", "Distant Pulsar", "Solar Wind", "Cloud Drifter"];
        const container = document.getElementById('player-container');

        songs.forEach((song) => {
            const card = document.createElement('div');
            card.className = "glass-card p-4 rounded-3xl flex items-center justify-between cursor-pointer transition-all duration-300 hover:bg-white/10 active:scale-[0.98]";
            
            card.innerHTML = `
                <div class="flex items-center gap-5">
                    <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-gray-700 to-gray-900 shadow-xl"></div>
                    <span class="text-lg font-medium tracking-wide">${song}</span>
                </div>
                
                <div class="relative p-[2px] rounded-full group">
                    <div class="absolute inset-0 bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-500 rounded-full opacity-0 group-hover:opacity-100 animate-border-spin transition-opacity duration-500"></div>
                    <button class="relative w-12 h-12 flex items-center justify-center rounded-full bg-[#1a1a20] hover:bg-[#25252e] transition-colors">
                        <svg class="w-6 h-6 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                    </button>
                </div>
            `;
            
            // Interaction: Toggle active state
            card.addEventListener('click', () => {
                card.classList.toggle('border-purple-500/50');
            });

            container.appendChild(card);
        });
    </script>
</body>
</html>
