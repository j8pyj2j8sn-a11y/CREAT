<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATORS SPACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('creator.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents whole page from scrolling */
        }

        .top-bar {
            height: 70px;
            background: #050505;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            flex-shrink: 0;
            z-index: 100;
        }

        /* Title Area: Stays static at the top of the scroll container */
        #header-container {
            padding: 2rem;
            flex-shrink: 0;
        }

        /* SCROLLABLE AREA: This is the ONLY part that moves */
        #scroll-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 2rem 2rem 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* Glass Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="text-white font-sans">

    <nav class="top-bar">
        <div class="text-lg font-bold tracking-widest uppercase">WE CREATE</div>
        <button class="px-6 py-2 rounded-full border border-gray-600 text-xs font-bold uppercase hover:bg-white/10 transition">GO BACK</button>
    </nav>

    <div id="scroll-container">
        <header id="header-container">
            <h1 class="text-[110px] font-black tracking-tighter leading-[0.9]">
                CREATORS<br>SPACE
            </h1>
        </header>

        <main id="player-container" class="space-y-4">
            </main>
    </div>

    <script>
        // Generate 50 songs
        const container = document.getElementById('player-container');
        const songs = Array.from({length: 50}, (_, i) => `Soundscape Track ${i + 1}`);
        
        songs.forEach((song) => {
            const card = document.createElement('div');
            card.className = "glass-card p-6 rounded-2xl flex items-center justify-between";
            card.innerHTML = `
                <span class="text-xl font-medium tracking-wide">${song}</span>
                <button class="w-12 h-12 flex items-center justify-center rounded-full bg-white/5 border border-white/10">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
