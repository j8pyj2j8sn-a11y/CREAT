<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATORS SPACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('creator.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            height: 70px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 100;
        }

        /* Title floating above the content */
        #main-title {
            position: absolute;
            top: 100px;
            left: 2rem;
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* Thin RGB Border for cards */
        .card-border-rgb {
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid transparent;
            background-clip: padding-box, border-box;
            background-origin: padding-box, border-box;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), linear-gradient(90deg, #ec4899, #8b5cf6, #06b6d4);
        }

        .silver-rgb-border {
            position: relative;
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .silver-rgb-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(90deg, #ec4899, #8b5cf6, #06b6d4, #ec4899);
            z-index: -1;
            border-radius: 9999px;
            animation: rotate 3s linear infinite;
        }

        #player-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            padding-top: 250px; /* Space for the floating title */
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-border-spin { animation: rotate 3s linear infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="text-white font-sans">

    <nav class="top-bar">
        <div class="text-xl font-bold tracking-widest uppercase">WE CREATE</div>
        <button class="silver-rgb-border px-6 py-2 rounded-full text-xs font-semibold hover:bg-white/10 transition-all uppercase">
            GO BACK
        </button>
    </nav>

    <header id="main-title">
        <h1 class="text-[110px] font-black tracking-tighter opacity-90 leading-[0.9]">
            CREATORS<br>SPACE
        </h1>
    </header>

    <main id="player-container" class="space-y-4">
    </main>

    <script>
        const container = document.getElementById('player-container');
        const title = document.getElementById('main-title');

        container.addEventListener('scroll', () => {
            title.style.opacity = Math.max(0, 1 - (container.scrollTop / 100));
        });

        const songs = Array.from({length: 50}, (_, i) => `Soundscape Track ${i + 1}`);
        songs.forEach((song) => {
            const card = document.createElement('div');
            // Using card-border-rgb for the thin border effect
            card.className = "card-border-rgb p-6 rounded-3xl flex items-center justify-between hover:bg-black/20 transition-all cursor-pointer";
            card.innerHTML = `
                <div class="flex items-center gap-6">
                    <div class="w-16 h-16 rounded-2xl bg-black/40 shadow-inner"></div>
                    <span class="text-xl font-medium tracking-wide">${song}</span>
                </div>
                <div class="relative p-[2px] rounded-full overflow-hidden shrink-0">
                    <div class="absolute inset-0 bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 animate-border-spin"></div>
                    <button class="relative w-14 h-14
