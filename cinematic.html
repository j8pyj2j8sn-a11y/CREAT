<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATORS SPACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. Opening Animation */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        body {
            background: #050505 url('creator.jpg') center/cover fixed;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 1s ease-out;
        }

        /* 2. Top Bar (Dark, Sticky) */
        .top-bar {
            height: 70px;
            background: #000;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            flex-shrink: 0;
            z-index: 100;
        }

        /* 3. Title (110px, 2 lines) */
        #main-title {
            padding: 2rem;
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
            will-change: opacity, transform;
            flex-shrink: 0;
        }

        /* 4. Scrollable Container */
        #scroll-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 2rem 2rem 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* 5. Liquid Glass Card with RGB Border */
        .glass-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid transparent;
            /* RGB Border Effect */
            background-clip: padding-box, border-box;
            background-origin: padding-box, border-box;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              linear-gradient(90deg, #ec4899, #8b5cf6, #06b6d4);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="text-white font-sans">

    <nav class="top-bar">
        <div class="text-xl font-bold tracking-widest">WE CREATE</div>
        <button class="px-6 py-2 rounded-full border border-gray-700 text-xs font-bold uppercase hover:border-white transition">GO BACK</button>
    </nav>

    <div id="scroll-container">
        <header id="main-title">
            <h1 class="text-[110px] font-black tracking-tighter leading-[0.9]">
                CREATORS<br>SPACE
            </h1>
        </header>

        <main id="player-container" class="space-y-4">
            </main>
    </div>

    <script>
        // Scroll Animation
        const container = document.getElementById('scroll-container');
        const title = document.getElementById('main-title');

        container.addEventListener('scroll', () => {
            const scrollPos = container.scrollTop;
            title.style.opacity = Math.max(0, 1 - (scrollPos / 150));
            title.style.transform = `translateY(-${scrollPos * 0.5}px)`;
        });

        // Generate 50 songs
        const songs = Array.from({length: 50}, (_, i) => `Soundscape Track ${i + 1}`);
        songs.forEach((song) => {
            const card = document.createElement('div');
            card.className = "glass-card";
            card.innerHTML = `
                <span class="text-xl font-medium">${song}</span>
                <button class="w-12 h-12 flex items-center justify-center rounded-full bg-white/5 border border-white/10">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
