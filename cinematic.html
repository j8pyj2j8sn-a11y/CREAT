<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATORS SPACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Black Titanium & Fixed Background Effect */
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('creator.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #player-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        /* RGB Border Animation */
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-border-spin { animation: rotate 3s linear infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="text-white font-sans p-6">

    <header class="max-w-2xl mx-auto mb-10 shrink-0 text-center md:text-left">
        <h1 class="text-4xl md:text-5xl font-bold tracking-tighter opacity-90">CREATORS SPACE</h1>
    </header>

    <main id="player-container" class="space-y-4">
        </main>

    <script>
        const songs = Array.from({length: 50}, (_, i) => `Soundscape Track ${i + 1}`);
        const container = document.getElementById('player-container');

        songs.forEach((song) => {
            const card = document.createElement('div');
            card.className = "glass-card p-5 rounded-3xl flex items-center justify-between hover:bg-white/5 transition-all cursor-pointer";
            
            card.innerHTML = `
                <div class="flex items-center gap-5">
                    <div class="w-14 h-14 rounded-2xl bg-black/40 shadow-inner"></div>
                    <span class="text-lg font-medium tracking-wide">${song}</span>
                </div>
                
                <div class="relative p-[1.5px] rounded-full overflow-hidden shrink-0">
                    <div class="absolute inset-0 bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 animate-border-spin"></div>
                    <button class="relative w-12 h-12 flex items-center justify-center rounded-full bg-[#0a0a0a] hover:bg-black transition-colors">
                        <svg class="w-6 h-6 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                    </button>
                </div>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
