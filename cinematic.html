<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATORS SPACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('creator.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        /* Fixed Top Bar */
        .top-bar {
            height: 70px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            flex-shrink: 0;
            z-index: 50;
        }

        /* Title Area - Normal flow now */
        #main-title {
            padding: 2rem;
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
            will-change: opacity, transform;
            flex-shrink: 0;
        }

        /* The container that actually scrolls */
        #player-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 2rem 2rem 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* Card with RGB-like Border */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.2s;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="text-white font-sans">

    <nav class="top-bar">
        <div class="text-xl font-bold tracking-widest uppercase">WE CREATE</div>
        <button class="px-6 py-2 rounded-full border border-gray-500 hover:border-white transition-all text-xs uppercase font-bold">GO BACK</button>
    </nav>

    <header id="main-title">
        <h1 class="text-[110px] font-black tracking-tighter leading-[0.9]">
            CREATORS<br>SPACE
        </h1>
    </header>

    <main id="player-container" class="space-y-4">
        </main>

    <script>
        const container = document.getElementById('player-container');
        const title = document.getElementById('main-title');

        container.addEventListener('scroll', () => {
            const scrollPos = container.scrollTop;
            const fadePoint = 150;
            let opacity = Math.max(0, 1 - (scrollPos / fadePoint));
            title.style.opacity = opacity;
            title.style.transform = `translateY(-${scrollPos * 0.5}px)`;
        });

        // Generate 50 songs
        const songs = Array.from({length: 50}, (_, i) => `Soundscape Track ${i + 1}`);
        songs.forEach((song) => {
            const card = document.createElement('div');
            card.className = "glass-card p-6 rounded-2xl flex items-center justify-between";
            card.innerHTML = `
                <span class="text-xl font-medium tracking-wide">${song}</span>
                <button class="w-12 h-12 flex items-center justify-center rounded-full bg-white/5 border border-white/10">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
