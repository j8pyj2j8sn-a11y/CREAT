<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE | Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body {
  min-height:100vh;
  overflow:hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.2)), url("background.jpg") center/cover;
}

/* PREMIUM LIQUID GLASS BOX */
.glass-box {
  position: relative;
  width: 88%; height: 80vh;
  border-radius: 50px;
  backdrop-filter: blur(2px);
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.15);
  transition: transform 0.2s ease-out;
  padding: 20px;
  overflow: hidden;
  will-change: transform;
  animation: entrance 1.5s var(--transition-smooth) backwards;
}

/* LIQUID BORDER ANIMATION */
.glass-box::before {
  content: "";
  position: absolute; inset: -1px;
  border-radius: 50px;
  padding: 1px;
  background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.4) 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude;
  animation: liquidBorder 6s linear infinite;
}

/* COMPONENTS */
.logo { display:flex; align-items:center; gap:12px; color:white; font-size:28px; font-weight:800; opacity:0; animation: fadeUp 1s 0.3s forwards; }
.logo-icon { color:#00eaff; font-size:32px; }

.hero-nav { display:flex; align-items:center; gap:22px; opacity:0; animation: fadeUp 1s 0.5s forwards; }
.dropdown { position:relative; }

.dropbtn {
  padding:14px 28px; border-radius:50px;
  background: rgba(0,0,0,0.2); color:#fff; font-weight:600; cursor:pointer;
  border: 4px solid rgba(255,255,255,0.1);
  transition: all 0.3s var(--transition-smooth);
}
.dropbtn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

.dropdown-content {
  position:absolute; top:60px; left:0; min-width:180px;
  background:rgba(20,20,20,0.8); backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1); border-radius:18px;
  opacity:0; visibility:hidden; transform:translateY(10px);
  transition:0.35s var(--transition-smooth);
  padding: 10px 0;
}
.dropdown.active .dropdown-content { opacity:1; visibility:visible; transform:translateY(0); }
.dropdown-content a { display:block; padding:12px 20px; color:white; text-decoration:none; font-size: 14px; transition:0.3s; }
.dropdown-content a:hover { background:rgba(0,234,255,0.1); color:#00eaff; }

.hero-text { margin-top: 100px; opacity: 0; animation: fadeUp 1s 0.8s forwards; }
.tagline { color:#00eaff; letter-spacing:4px; margin-bottom:20px; }
h1 { font-size:110px; font-weight:900; background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%); line-height: 0.9; }

/* ANIMATIONS */
@keyframes liquidBorder { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
@keyframes fadeUp { 0% { opacity:0; transform:translateY(30px); } 100% { opacity:1; transform:translateY(0); } }
@keyframes entrance { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>

<div class="glass-box">
  <div class="hero-header" style="display:flex; justify-content:space-between; align-items:center;">
    <div class="logo"><div class="logo-icon">△</div> WE CREATE</div>
    <div class="hero-nav">
      <div class="dropdown"><button class="dropbtn">Troll Vault ▼</button>
        <div class="dropdown-content"><a href="meme-sounds.html">Meme Sounds</a><a href="trending-trolls.html">Trending Trolls</a><a href="classic-trolls.html">Classic Trolls</a></div>
      </div>
      <div class="dropdown"><button class="dropbtn">NCS ▼</button>
        <div class="dropdown-content"><a href="gamingmusic.html">Gaming Music</a><a href="edm.html">EDM</a><a href="chill-music.html">Chill Music</a></div>
      </div>
      <div class="dropdown"><button class="dropbtn">EchoScapes ▼</button>
        <div class="dropdown-content"><a href="rain.html">Rain</a><a href="forest.html">Forest</a><a href="ocean.html">Ocean</a></div>
      </div>
      <div class="dropdown"><button class="dropbtn">CineTone ▼</button>
        <div class="dropdown-content"><a href="cinematic.html">Cinematic</a><a href="epic.html">Epic</a><a href="documentary.html">Documentary</a></div>
      </div>
    </div>
  </div>
    
  <div class="hero-text">
      <div class="tagline">DISCOVER • LISTEN • DOWNLOAD</div>
      <h1>WE CREATE<br>FOR YOU</h1>
  </div>
</div>

<script>
// Handle Dropdown Toggling
document.querySelectorAll(".dropdown").forEach(d => {
  d.addEventListener("click", (e) => {
    e.stopPropagation();
    const isActive = d.classList.contains("active");
    document.querySelectorAll(".dropdown").forEach(i => i.classList.remove("active"));
    if (!isActive) d.classList.add("active");
  });
});

// Parallax Effect
const box = document.querySelector('.glass-box');
document.addEventListener('mousemove', (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 15;
  const y = (e.clientY / window.innerHeight - 0.5) * 15;
  box.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
});

// Close when clicking outside
document.addEventListener("click", () => document.querySelectorAll(".dropdown").forEach(d => d.classList.remove("active")));
</script>
</body>
</html>
