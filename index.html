<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE CREATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { 
            min-height:100vh; background: #000; color: #fff; overflow: hidden;
            opacity: 0; transition: opacity 0.8s ease-in-out;
            background: linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.25)), url("background.jpg") center/cover;
        }
        body.loaded { opacity: 1; }

        /* Navigation Styles */
        .glass-box { position:absolute; top:110px; left:50%; transform:translateX(-50%); width:88%; height:80vh; border-radius:50px; background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); padding:40px; }
        .dropdown { position:relative; display:inline-block; }
        .dropbtn { padding:14px 28px; border-radius:50px; background:#111; border:1px solid #333; color:#fff; cursor:pointer; }
        .dropdown-content { position:absolute; top:60px; left:0; background:#222; border-radius:15px; overflow:hidden; opacity:0; visibility:hidden; transition:0.3s; z-index:999; }
        .dropdown.active .dropdown-content { opacity:1; visibility:visible; }
        .dropdown-content a { display:block; padding:15px; color:white; text-decoration:none; }
        .dropdown-content a:hover { background:#00eaff; color:black; }

        /* Quote Animation */
        #quote-container { position:absolute; bottom:60px; left:50%; transform:translateX(-50%); font-style:italic; opacity:0; transition:opacity 1s ease; text-align:center; width:80%; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="glass-box">
    <div class="hero">
        <div class="hero-header">
            <div class="hero-logo">WE CREATE</div>
            <nav class="hero-nav">
                <div class="dropdown">
                    <button class="dropbtn">Troll Vault ▼</button>
                    <div class="dropdown-content">
                        <a href="meme-sounds.html">Meme Sounds</a>
                        <a href="trending-trolls.html">Trending Trolls</a>
                    </div>
                </div>
                <!-- Add other dropdowns here following the same pattern -->
            </nav>
        </div>
        <h1>WE CREATE FOR YOU</h1>
    </div>

    <div id="quote-container">
        <p id="quote-text">"Creativity is intelligence having fun."</p>
    </div>
</div>

<script>
    window.addEventListener('load', () => document.body.classList.add('loaded'));

    const dropdowns = document.querySelectorAll(".dropdown");
    dropdowns.forEach(d => {
        d.querySelector(".dropbtn").addEventListener("click", (e) => {
            e.stopPropagation();
            dropdowns.forEach(i => i !== d && i.classList.remove("active"));
            d.classList.toggle("active");
        });
    });

    const quotes = ["Creativity is intelligence having fun.", "Design is the silent ambassador of your brand.", "Simplicity is the ultimate sophistication."];
    let qIdx = 0;
    setInterval(() => {
        const qEl = document.getElementById('quote-container');
        qEl.style.opacity = 0;
        setTimeout(() => {
            qIdx = (qIdx + 1) % quotes.length;
            document.getElementById('quote-text').innerText = `"${quotes[qIdx]}"`;
            qEl.style.opacity = 1;
        }, 1000);
    }, 15000);
</script>
</body>
</html>
