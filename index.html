<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
overflow:hidden;

background:
linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.25)),
url("background.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* TOP BAR */


.logo{
display:flex;
align-items:center;
gap:12px;

color:white;
font-size:28px;
font-weight:800;
}

.logo-icon{
color:#00eaff;
font-size:32px;
}

.nav{
display:flex;
gap:35px;
align-items:center;
}

.dropdown{
position:relative;
}

.dropbtn{

display:inline-flex;
align-items:center;
justify-content:center;

padding:14px 28px;

border-radius:50px;

background:linear-gradient(
180deg,
#2b2b2b 0%,
#151515 20%,
#080808 50%,
#1a1a1a 80%,
#2d2d2d 100%
);

border:1px solid rgba(255,255,255,.18);

color:#fff;

font-size:15px;
font-weight:600;

cursor:pointer;

position:relative;

transition:.35s ease;

box-shadow:
0 8px 18px rgba(0,0,0,.45),
inset 0 1px 1px rgba(255,255,255,.12);

overflow:hidden;

}

 .dropbtn::before{

content:"";

position:absolute;

inset:-2px;

border-radius:50px;

padding:2px;

background:linear-gradient(
90deg,
#ff0000,
#ff7f00,
#ffff00,
#00ff00,
#00ffff,
#0066ff,
#8b00ff,
#ff0000
);

background-size:400%;

animation:rgbBorder 8s linear infinite;

-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);

-webkit-mask-composite:xor;
mask-composite:exclude;

pointer-events:none;

}

.dropbtn:hover{

transform:translateY(-2px);

box-shadow:
0 0 10px rgba(255,0,0,.3),
0 0 15px rgba(0,255,255,.25),
0 8px 25px rgba(0,0,0,.45);

}

 @keyframes rgbBorder{

0%{
background-position:0%;
}

100%{
background-position:400%;
}

}

.dropdown-content{

position:absolute;
top:55px;
left:0;

min-width:220px;

background:rgba(10,10,10,.95);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

overflow:hidden;

opacity:0;
visibility:hidden;

transform:translateY(15px);

transition:.35s ease;

z-index:999;
}

.dropdown.active .dropdown-content{
opacity:1;
visibility:visible;
transform:translateY(0);
}

.dropdown-content a{

display:block;

padding:15px 18px;

text-decoration:none;

color:white;

transition:.3s;
}

.dropdown-content a:hover{
background:#00eaff;
color:black;
}

.right{
display:flex;
gap:15px;
align-items:center;
}

.vibe-btn{

padding:14px 24px;

border-radius:50px;

background:rgba(0,0,0,.5);

border:1px solid rgba(0,234,255,.4);

color:white;

cursor:pointer;
}

.menu-btn{

width:55px;
height:55px;

border-radius:50%;

background:rgba(0,0,0,.5);

border:1px solid rgba(0,234,255,.4);

color:white;

font-size:22px;

cursor:pointer;
}

/* GLASS PANEL */

.glass-box{

position:absolute;

top:110px;
left:50%;

transform:translateX(-50%);

width:88%;
height:80vh;



overflow:hidden;
 

backdrop-filter:blur(.5px);

background:
linear-gradient(
to bottom,
rgba(0,0,0,.98) 0%,
rgba(0,0,0,.95) 25%,
rgba(0,0,0,.70) 50%,
rgba(0,0,0,.20) 75%,
rgba(0,0,0,0) 100%
);

animation:panelReveal 1.5s ease forwards;
}

@keyframes panelReveal{

from{
opacity:0;
transform:translate(-50%,40px);
}

to{
opacity:1;
transform:translate(-50%,0);
}

}

/* HERO */

.hero{

position:absolute;

top:20px;

left:55px;
right:55px;
bottom:55px;

display:flex;
flex-direction:column;

}

.hero-header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:80px;

width:100%;

}

.hero-logo{

display:flex;
align-items:center;
gap:12px;

color:#fff;

font-size:28px;
font-weight:800;

}

.hero-logo .logo-icon{

font-size:32px;
color:#00eaff;

}

.hero-nav{

display:flex;
align-items:center;
gap:22px;

}

.tagline{

color:#00eaff;

font-size:15px;

letter-spacing:4px;

font-weight:600;

margin-bottom:25px;

animation:fadeUp 1.2s ease .2s both;
}

.hero h1{

font-size:110px;

font-weight:900;

line-height:.92;

color:white;

animation:fadeUp 1.2s ease .4s both;
}

.hero h1 span{

display:block;

background:linear-gradient(
160deg,
#f5f5f5 0%,
#8a8a8a 6%,
#3a3a3a 15%,
#1a1a1a 28%,
#050505 50%,
#111111 68%,
#444444 82%,
#bcbcbc 94%,
#fdfdfd 100%
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.description{

margin-top:30px;

font-size:22px;

line-height:1.8;

color:#d8d8d8;

max-width:650px;

animation:fadeUp 1.2s ease .6s both;
}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.scroll{

position:absolute;

bottom:25px;
left:50%;

transform:translateX(-50%);

color:white;

font-size:13px;

letter-spacing:4px;
}

/* MOBILE */

@media(max-width:1000px){

.nav{
display:none;
}

.topbar{
padding:20px;
}

.hero{
left:30px;
right:30px;
top:100px;
}

.hero h1{
font-size:60px;
}

.description{
font-size:18px;
}

.glass-box{
width:94%;
height:82vh;
}

}

</style>

</head>
<body>

<div class="hero">

<div class="hero-header">

<div class="hero-logo">

</div>

<div class="hero-nav">

</div>

</div>

</div>

<div class="tagline">
DISCOVER • LISTEN • DOWNLOAD
</div>

<h1>
WE CREATE
<span>FOR YOU</span>
</h1>

<div class="description">
Explore a curated collection of meme sounds,
ambient music, royalty-free tracks and cinematic audio.
</div>

</div>

<script>

const dropdowns = document.querySelectorAll(".dropdown");

dropdowns.forEach(dropdown => {

const button = dropdown.querySelector(".dropbtn");

button.addEventListener("click",(e)=>{

e.stopPropagation();

dropdowns.forEach(item=>{
if(item!==dropdown){
item.classList.remove("active");
}
});

dropdown.classList.toggle("active");

});

});

document.addEventListener("click",()=>{

dropdowns.forEach(item=>{
item.classList.remove("active");
});

});

</script>

</body>
</html>
