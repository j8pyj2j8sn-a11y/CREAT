<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATORS SPACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: rotate 3s linear infinite; }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 md:p-10 font-sans">

    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-purple-900/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-900/20 blur-[120px] rounded-full"></div>
    </div>

    <header class="max-w-xl mx-auto mb-12">
        <h1 class="text-xl font-light tracking-[0.2em] opacity-80">CREATORS SPACE</h1>
    </header>

    <main id="app" class="max-w-xl mx-auto space-y-4">
        </main>

    <script>
        const songs = ["Astral Echoes", "Midnight Neon", "Oceanic Flow", "Distant Pulsar", "Solar Wind"];
        const container = document.getElementById('app');

        songs.forEach((song) => {
            const card = document.createElement('div');
            card.className = "glass p-4 rounded-2xl flex items-center justify-between cursor-pointer transition-all hover:bg-white/10 active:scale-[0.98]";
            
            card.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-gray-700 to-gray-900 shadow-lg"></div>
                    <span class="font-medium text-lg tracking-wide">${song}</span>
                </div>
                <div class="relative p-[1px] rounded-full group overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 animate-spin-slow opacity-0 group-hover:opacity-100 transition-opacity rounded-full"></div>
                    <button class="relative w-10 h-10 flex items-center justify-center rounded-full bg-slate-900 hover:bg-slate-800 transition-colors">
                        <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    </button>
                </div>
            `;
            
            // Interaction: Toggle state
            card.addEventListener('click', () => {
                card.classList.toggle('border-purple-500/50');
                card.classList.toggle('bg-white/10');
            });

            container.appendChild(card);
        });
    </script>
</body>
</html>
