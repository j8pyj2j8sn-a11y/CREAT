<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE | Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
  --glass-bg: rgba(10, 10, 10, 0.6);
  --glass-border: rgba(255, 255, 255, 0.1);
  --accent-glow: 0 0 30px rgba(0, 234, 255, 0.15);
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body {
  min-height:100vh;
  overflow:hidden;
  background: linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)), url("background.jpg");
  background-size:cover;
  background-position:center;
}

/* GLASS PANEL */
.glass-box {
  position:absolute;
  top:110px;
  left:50%;
  transform:translateX(-50%);
  width:88%;
  height:80vh;
  border-radius:40px;
  overflow:hidden;
  backdrop-filter:blur(20px) saturate(180%);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  transition: transform 0.2s ease-out, border 0.5s ease, background 0.5s ease;
  will-change: transform;
}

.glass-box:hover {
  border: 1px solid rgba(0, 234, 255, 0.3);
  background: rgba(10, 10, 10, 0.7);
}

/* DROPBUTTONS */
.dropbtn {
  padding:14px 28px;
  border-radius:50px;
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition: transform 0.6s var(--transition-smooth), box-shadow 0.6s var(--transition-smooth);
}

.dropbtn:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5), var(--accent-glow);
}

/* ENTRANCE ANIMATIONS */
@keyframes fadeUp {
  0% { opacity: 0; transform: translateY(40px); filter: blur(10px); }
  100% { opacity: 1; transform: translateY(0); filter: blur(0px); }
}

.tagline, .hero h1, .description {
  animation: fadeUp 1.2s var(--transition-smooth) both;
}

.tagline { animation-delay: 0.2s; color:#00eaff; letter-spacing:4px; margin-bottom:25px; }
.hero h1 { animation-delay: 0.4s; font-size:110px; font-weight:900; line-height:.92; color:white; }
.description { animation-delay: 0.6s; margin-top:30px; font-size:22px; line-height:1.8; color:#d8d8d8; }

/* Existing layout styles maintained */
.hero { position:absolute; top:20px; left:55px; right:55px; bottom:55px; display:flex; flex-direction:column; }
.hero-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:80px; }
.hero-nav { display:flex; align-items:center; gap:22px; }
.dropdown-content { position:absolute; top:55px; left:0; min-width:220px; background:rgba(10,10,10,.95); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.08); border-radius:18px; opacity:0; visibility:hidden; transform:translateY(15px); transition:.35s ease; z-index:999; }
.dropdown.active .dropdown-content { opacity:1; visibility:visible; transform:translateY(0); }
.dropdown-content a { display:block; padding:15px 18px; text-decoration:none; color:white; }
.dropdown-content a:hover { background:#00eaff; color:black; }
</style>
</head>
<body>

<div class="glass-box">
  <div class="hero">
    <div class="hero-header">
      <div class="hero-logo">△ WE CREATE</div>
      <div class="hero-nav">
        <div class="dropdown">
          <button class="dropbtn">Troll Vault ▼</button>
          <div class="dropdown-content">
            <a href="#">Meme Sounds</a>
            <a href="#">Trending Trolls</a>
          </div>
        </div>
        </div>
    </div>

    <div class="tagline">DISCOVER • LISTEN • DOWNLOAD</div>
    <h1>WE CREATE <br><span class="for-you">FOR YOU</span></h1>
    <div class="description">Explore a curated collection of ambient music and cinematic audio.</div>
  </div>
</div>

<script>
// Toggle Dropdowns
const dropdowns = document.querySelectorAll(".dropdown");
dropdowns.forEach(dropdown => {
  dropdown.querySelector(".dropbtn").addEventListener("click", (e) => {
    e.stopPropagation();
    dropdowns.forEach(item => item !== dropdown && item.classList.remove("active"));
    dropdown.classList.toggle("active");
  });
});

// Premium Tilt Effect
const box = document.querySelector('.glass-box');
document.addEventListener('mousemove', (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 5;
  const y = (e.clientY / window.innerHeight - 0.5) * 5;
  box.style.transform = `translateX(-50%) perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
});

document.addEventListener("click", () => {
  dropdowns.forEach(item => item.classList.remove("active"));
});
</script>

</body>
</html>
