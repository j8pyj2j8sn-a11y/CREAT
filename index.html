<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE | Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
  --accent-rgb: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0066ff, #8b00ff, #ff0000);
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body {
  min-height:100vh;
  overflow:hidden;
  background: linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.25)), url("background.jpg");
  background-size:cover;
  background-position:center;
}

.glass-box {
  position: absolute;
  top: 110px;
  left: 50%;
  transform: translateX(-50%);
  width: 88%;
  height: 80vh;
  border-radius: 50px;
  
  /* Glass Aesthetics */
  backdrop-filter: blur(1px);
  background: rgba(0, 0, 0, 0.0.4);
  
  /* RGB Border Technique */
  border: 2px solid transparent;
  background-clip: padding-box, border-box;
  background-origin: border-box;
  background-image: linear-gradient(rgba(0,0,0,0.0.1), rgba(0,0,0,0.0.01)), 
                    linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0066ff, #8b00ff, #ff0000);
  background-size: 100%, 400%;
  animation: rgbBorder 8s linear infinite;

  transition: transform 0.2s ease-out;
  will-change: transform;
}

@keyframes rgbBorder {
  0% { background-position: 100% 0%, 0% 50%; }
  100% { background-position: 100% 0%, 400% 50%; }
}

/* LOGO & NAV */
.logo { display:flex; align-items:center; gap:12px; color:white; font-size:28px; font-weight:800; }
.logo-icon { color:#00eaff; font-size:32px; }

.hero-nav { display:flex; align-items:center; gap:22px; }
.dropdown { position:relative; }

/* PREMIUM RGB BUTTONS */
.dropbtn {
  padding:14px 28px; border-radius:50px;
  background: #111; color:#fff; font-weight:600; cursor:pointer;
  border: 1px solid rgba(255,255,255,0.1);
  position: relative; overflow: hidden;
  transition: transform 0.6s var(--transition-smooth);
}

.dropbtn::before {
  content: ""; position: absolute; inset: -2px;
  background: var(--accent-rgb);
  background-size: 400%;
  border-radius: 50px;
  opacity: 0; transition: opacity 0.3s;
  z-index: -1; animation: rgbBorder 8s linear infinite;
}

.dropbtn:hover::before { opacity: 1; }
.dropbtn:hover { transform: translateY(-3px); }

/* DROPDOWN CONTENT */
.dropdown-content {
  position:absolute; top:60px; left:0; min-width:200px;
  background:rgba(10,10,10,0.9); backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1); border-radius:18px;
  opacity:0; visibility:hidden; transform:translateY(10px);
  transition:0.35s var(--transition-smooth);
}
.dropdown.active .dropdown-content { opacity:1; visibility:visible; transform:translateY(0); }
.dropdown-content a { display:block; padding:15px 20px; color:white; text-decoration:none; transition:0.3s; }
.dropdown-content a:hover { background:rgba(0,234,255,0.2); color:#00eaff; }

/* ANIMATIONS */
@keyframes rgbBorder { 0% { background-position: 0%; } 100% { background-position: 400%; } }
@keyframes fadeUp { 0% { opacity:0; transform:translateY(30px); } 100% { opacity:1; transform:translateY(0); } }

.hero { padding: 55px; }
.hero h1 { font-size:110px; font-weight:900; color:white; animation: fadeUp 1s var(--transition-smooth) both; }
.tagline { color:#00eaff; letter-spacing:4px; margin-bottom:20px; }
</style>
</head>
<body>

<div class="glass-box">
  <div class="hero">
    <div class="hero-header" style="display:flex; justify-content:space-between; align-items:center;">
      <div class="logo"><div class="logo-icon">△</div> WE CREATE</div>
      <div class="hero-nav">
        <div class="dropdown"><button class="dropbtn">Troll Vault ▼</button>
          <div class="dropdown-content"><a href="meme-sounds.html">Meme Sounds</a><a href="trending-trolls.html">Trending Trolls</a><a href="classic-trolls.html">Classic Trolls</a></div>
        </div>
        <div class="dropdown"><button class="dropbtn">NCS ▼</button>
          <div class="dropdown-content"><a href="gamingmusic.html">Gaming Music</a><a href="edm.html">EDM</a><a href="chill-music.html">Chill Music</a></div>
        </div>
        <div class="dropdown"><button class="dropbtn">EchoScapes ▼</button>
          <div class="dropdown-content"><a href="rain.html">Rain</a><a href="forest.html">Forest</a><a href="ocean.html">Ocean</a></div>
        </div>
        <div class="dropdown"><button class="dropbtn">CineTone ▼</button>
          <div class="dropdown-content"><a href="cinematic.html">Cinematic</a><a href="epic.html">Epic</a><a href="documentary.html">Documentary</a></div>
        </div>
      </div>
    </div>
    
    <div style="margin-top: 100px;">
        <div class="tagline">DISCOVER • LISTEN • DOWNLOAD</div>
        <h1>WE CREATE<br>FOR YOU</h1>
    </div>
  </div>
</div>

<script>
const dropdowns = document.querySelectorAll(".dropdown");
dropdowns.forEach(d => {
  d.querySelector(".dropbtn").addEventListener("click", (e) => {
    e.stopPropagation();
    dropdowns.forEach(i => i !== d && i.classList.remove("active"));
    d.classList.toggle("active");
  });
});

const box = document.querySelector('.glass-box');
document.addEventListener('mousemove', (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 2;
  const y = (e.clientY / window.innerHeight - 0.5) * 2;
  box.style.transform = `translateX(-50%) perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
});

document.addEventListener("click", () => dropdowns.forEach(d => d.classList.remove("active")));
</script>
</body>
</html>
