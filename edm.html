<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Premium Teaser</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-rgb: 100, 200, 255;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: var(--font-main);
            color: #fff;
        }

        /* Background with Ken Burns Effect */
        #bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('soon.jpg') center/cover no-repeat;
            animation: zoomBg 20s ease-out infinite alternate;
            filter: blur(5px);
        }

        .overlay-gradient {
            position: absolute;
            bottom: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }

        /* Centered Glass Panel */
        .glass-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 4rem 6rem;
            border-radius: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            opacity: 0;
            animation: fadeInGlass 1.5s ease-out forwards;
        }

        /* Animated RGB Border */
        .glass-panel::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 52px;
            padding: 2px;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: rotateBorder 3s linear infinite;
        }

        /* Typography */
        h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #eee 0%, #aaa 50%, #eee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        /* Light Sweep Effect */
        h1::after {
            content: "COMING SOON...";
            position: absolute; top: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            -webkit-background-clip: text;
            background-size: 200% 100%;
            animation: sweep 4s infinite;
        }

        /* Keyframes */
        @keyframes zoomBg { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes fadeInGlass { 
            to { opacity: 1; transform: translate(-50%, -60%); } 
        }
        @keyframes rotateBorder { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }
        @keyframes sweep { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    </style>
</head>
<body>

    <div id="bg-container"></div>
    <div class="overlay-gradient"></div>

    <div class="glass-panel" id="mainPanel">
        <h1>COMING SOON...</h1>
    </div>

    <audio id="bgm" loop>
        <source src="BGM.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('bgm');
        audio.volume = 0.3;

        // Autoplay logic with user interaction fallback
        function startAudio() {
            audio.play().catch(e => console.log("Autoplay blocked, waiting for click."));
            document.removeEventListener('click', startAudio);
        }

        document.addEventListener('click', startAudio);
        window.addEventListener('load', () => {
            startAudio();
        });
    </script>
</body>
</html>
