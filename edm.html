<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | WE CREATE</title>
    <style>
        /* Base Reset & Styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Navigation Logo */
        .nav-logo {
            position: absolute;
            top: 30px;
            right: 40px;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            transition: opacity 0.3s ease;
        }

        .nav-logo:hover {
            opacity: 0.7;
        }

        /* Floating Container */
        .container {
            animation: float 6s ease-in-out infinite;
        }

        /* RGB Animated Text */
        .coming-soon {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            background: linear-gradient(90deg, #ff0000, #00ff00, #0000ff, #ff0000);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rgb-move 8s linear infinite;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes rgb-move {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        /* Responsive Tweaks */
        @media (max-width: 768px) {
            .coming-soon { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="nav-logo">WE CREATE</a>

    <div class="container">
        <h1 class="coming-soon">COMING SOON…</h1>
    </div>

</body>
</html>
