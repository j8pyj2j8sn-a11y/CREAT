<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMING SOON</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('soon.jpg') center/cover no-repeat;
            animation: zoomBg 20s ease-out infinite alternate;
            filter: blur(0px);
        }

        .overlay-gradient {
            position: absolute;
            bottom: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }

        /* Home Button with RGB Border */
        .logo-container {
            position: absolute;
            top: 40px; left: 40px;
            z-index: 100;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 1rem;
            text-transform: uppercase;
            padding: 15px 30px;
            border-radius: 20px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(0px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .logo-container:hover { background: rgba(255, 255, 255, 0.1); }

        /* Liquid Glass Card */
        .glass-panel {
            position: relative;
            padding: 5rem 7rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.02); /* Higher transparency */
            backdrop-filter: blur(0px) saturate(200%);
            -webkit-backdrop-filter: blur(1px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-panel:hover { transform: scale(1.02); }

        /* Animated RGB Borders for both elements */
        .rgb-border::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            padding: 2px;
            background: linear-gradient(45deg, #ff00cc, #3333ff, #00ffff, #ff00cc);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: rotateBorder 4s linear infinite;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #hint {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        @keyframes zoomBg { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes rotateBorder { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }
    </style>
</head>
<body>

    <div id="bg-container"></div>
    
    <!-- RGB Home Button -->
    <a href="index.html" class="logo-container rgb-border">WE CREATE</a>

    <!-- RGB Glass Panel -->
    <div class="glass-panel rgb-border" id="card">
        <h1>COMING SOON</h1>
        <div id="hint">Tap to experience</div>
    </div>

    <audio id="bgm" loop>
        <source src="BGM.mp3" type="audio/mpeg">
    </audio>

    <script>
        const card = document.getElementById('card');
        const audio = document.getElementById('bgm');
        const hint = document.getElementById('hint');
        let played = false;

        card.addEventListener('click', () => {
            if (!played) {
                audio.volume = 0.3;
                audio.play();
                hint.innerText = "Experience Initialized";
                played = true;
            }
        });
    </script>
</body>
</html>
