<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE | Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root { --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1); }
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body {
  min-height:100vh;
  overflow:hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  /* Updated background: Looks for background.jpg in the same folder as index.html */
  background: linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.2)), url("background.jpg") center/cover;
}
.glass-box {
  position: relative; width: 88%; height: 80vh; border-radius: 50px;
  backdrop-filter: blur(2px); background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.15);
  transition: transform 0.2s ease-out; padding: 20px; overflow: hidden;
  animation: entrance 1.5s var(--transition-smooth) backwards;
}
.glass-box::before {
  content: ""; position: absolute; inset: -1px; border-radius: 50px; padding: 1px;
  background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.4) 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude; animation: liquidBorder 6s linear infinite;
}
.logo { display:flex; align-items:center; gap:12px; color:white; font-size:28px; font-weight:800; }
.logo-icon { color:#00eaff; font-size:32px; }
.hero-nav { display:flex; align-items:center; gap:22px; }
.dropdown { position:relative; }
.dropbtn {
  padding:14px 28px; border-radius:50px; background: rgba(0,0,0,0.2); color:#fff; font-weight:600; cursor:pointer;
  border: 1px solid #00ffff; transition: all 0.3s var(--transition-smooth);
}
.dropdown-content {
  position:absolute; top:60px; left:0; min-width:180px;
  background:rgba(20,20,20,0.8); backdrop-filter:blur(20px);
  border:2px solid rgba(255,255,255,0.1); border-radius:18px;
  opacity:0; visibility:hidden; transform:translateY(10px);
  transition:0.35s var(--transition-smooth); padding: 10px 0;
}
.dropdown.active .dropdown-content { opacity:1; visibility:visible; transform:translateY(0); }
.dropdown-content a { display:block; padding:12px 20px; color:#00ffff; text-decoration:none; font-size: 14px; }
.dropdown-content a:hover { background:rgba(0,234,255,0.4); }
@keyframes liquidBorder { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
</style>
</head>
<body>
<div class="glass-box">
  <div class="hero-header" style="display:flex; justify-content:space-between; align-items:center;">
    <div class="logo"><div class="logo-icon">△</div> WE CREATE</div>
    <div class="hero-nav">
      <!-- Changed links to point to the correct folder name: HTML/ -->
      <div class="dropdown"><button class="dropbtn">LOUNGE ▼</button>
        <div class="dropdown-content"><a href="HTML/meme-sounds.html">Meme Sounds</a><a href="HTML/trending-trolls.html">Trending Trolls</a><a href="HTML/classic-trolls.html">Classic Trolls</a></div>
      </div>
      <div class="dropdown"><button class="dropbtn">NCS ▼</button>
        <div class="dropdown-content"><a href="HTML/gamingmusic.html">Gaming Music</a><a href="HTML/edm.html">EDM</a><a href="HTML/chill-music.html">Chill Music</a></div>
      </div>
      <div class="dropdown"><button class="dropbtn">AMBIENT ▼</button>
        <div class="dropdown-content"><a href="HTML/rain.html">Rain</a><a href="HTML/forest.html">Forest</a><a href="HTML/ocean.html">Ocean</a></div>
      </div>
      <div class="dropdown"><button class="dropbtn">TROLL TUNE ▼</button>
        <div class="dropdown-content"><a href="HTML/cinematic.html">Cinematic</a><a href="HTML/epic.html">Epic</a><a href="HTML/documentary.html">Documentary</a></div>
      </div>
    </div>
  </div>
</div>
<script>
document.querySelectorAll(".dropdown").forEach(d => {
  d.addEventListener("click", (e) => {
    e.stopPropagation();
    const isActive = d.classList.contains("active");
    document.querySelectorAll(".dropdown").forEach(i => i.classList.remove("active"));
    if (!isActive) d.classList.add("active");
  });
});
</script>
</body>
</html>
