<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE • Game Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
    *{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    html{ scroll-behavior:smooth; }
    body{ background:#050505; color:#fff; overflow-x:hidden; }

    /* Background Layers */
    .bg-image { position: fixed; inset: 0; background: url("BACKGROUND.jpg") no-repeat center center; background-size: cover; z-index: -4; animation: atmosphericScale 2.2s cubic-bezier(0.16, 1, 0.3, 1) both; transition: opacity 0.8s ease; }
    .bg { position:fixed; inset:0; background:radial-gradient(circle at top,#222,#050505 70%); transition:1s; z-index:-3; opacity: 0.65; animation: atmosphericScale 2.2s cubic-bezier(0.16, 1, 0.3, 1) both; }

    /* Header & Logo */
    header { position:fixed; top:0; left:0; width:100%; padding:22px 60px; display:flex; justify-content:space-between; align-items:center; backdrop-filter:blur(20px); background:rgba(0,0,0,.18); z-index:1000; }
    .logo a { color: inherit; text-decoration: none; display: flex; align-items: center; padding: 8px 20px; background: rgba(255, 255, 255, .05); border: 1px solid rgba(255, 255, 255, .08); border-radius: 50px; cursor: pointer; position: relative; overflow: hidden; transition: .3s; }
    .logo a::before { content: ""; position: absolute; inset: 0; padding: 1.5px; border-radius: 50px; background: linear-gradient(90deg, #00eaff, #4d7cff, #9b5cff, #ff2f92, #00eaff); background-size: 300%; animation: rgbBorder 6s linear infinite; -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; pointer-events: none; }
    .logo .we-text { color: #f5f5f5; margin-right: 6px; }
    .logo span { color:#00E5FF; }
    nav { display:flex; gap:35px; }
    nav a { color:white; text-decoration:none; font-weight:500; transition:.3s; }
    nav a:hover { color:#00E5FF; }

    /* Hero */
    .hero { padding-top:150px; text-align:center; padding-bottom:60px; }
    .hero h1 { font-size:85px; font-weight:900; background: linear-gradient(180deg, #fafafa 0%, #5a5a5a 8%, #1c1c1c 20%, #3f3f3f 50%, #4d4d4d 80%, #d9d9d9 92%, #111111 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* Music Grid */
    .music { padding:0 60px 140px; }
    .card { display:flex; align-items:center; gap:18px; padding:18px; margin-bottom:18px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:24px; cursor:pointer; position:relative; overflow:hidden; transition:.35s; }
    .card:hover { transform:translateY(-3px); background:rgba(255,255,255,.08); }
    .card::before { content:""; position:absolute; inset:0; padding:1px; border-radius:24px; background:linear-gradient(90deg, #00eaff, #4d7cff, #9b5cff, #ff2f92, #00eaff); background-size:300%; animation:rgbBorder 6s linear infinite; -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite:xor; pointer-events:none; }
    .card img { width:75px; height:75px; border-radius:60px; object-fit:cover; transition:.4s; }
    .card.active img { animation:spinAlbum 12s linear infinite; }
    .equalizer { display:flex; gap:4px; align-items:flex-end; height:24px; margin-right:18px; opacity:0; }
    .equalizer span { width:4px; border-radius:20px; background:#00E5FF; animation:equalizer .8s infinite alternate; }
    .card.active .equalizer { opacity:1; }
    
    /* Elements */
    .download { width:44px; height:44px; border-radius:50%; display:flex; justify-content:center; align-items:center; background:rgba(255,255,255,.08); transition:.3s; text-decoration: none; color: white; }
    .search { position:fixed; bottom:25px; left:50%; transform:translateX(-50%); width:min(700px,92%); z-index: 10; }
    .search input { width:100%; padding:18px 22px; border:none; border-radius:50px; background:rgba(255,255,255,.08); backdrop-filter:blur(20px); color:white; }

    @keyframes rgbBorder { 0%{ background-position:0%; } 100%{ background-position:300%; } }
    @keyframes spinAlbum { from { transform:rotate(0deg) scale(1.08); } to { transform:rotate(360deg) scale(1.08); } }
    @keyframes equalizer { from { transform:scaleY(.5); } to { transform:scaleY(1.5); } }
    @keyframes atmosphericScale { 0% { opacity: 0; transform: scale(1.12); } 100% { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>

<div class="bg-image"></div>
<div class="bg"></div>

<header>
    <div class="logo"><a id="homeButton"><span class="we-text">WE</span> <span>CREATE</span></a></div>
    <nav>
        <a href="index.html">Home</a>
        <a href="nocopyrightmusic.html">NO COPYRIGHT MUSIC</a>
    </nav>
</header>

<section class="hero">
    <h1>GAME<span>MUSIC</span></h1>
</section>

<section class="music">
    <div class="card" data-song="songs/song1.mp3">
        <img src="covers/cover1.jpg" crossorigin="anonymous">
        <div class="info"><h3>Midnight Echo</h3><p>Lounge Music</p></div>
        <div class="equalizer"><span></span><span></span><span></span></div>
        <a class="download" href="songs/song1.mp3" download>↓</a>
    </div>
</section>

<div class="search"><input type="text" id="searchInput" placeholder="Search music..."></div>
<audio id="player"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.4.0/color-thief.min.js"></script>
<script>
    const player = document.getElementById("player"), cards = document.querySelectorAll(".card"), background = document.querySelector(".bg"), bgImage = document.querySelector(".bg-image"), searchInput = document.getElementById("searchInput"), homeButton = document.getElementById("homeButton"), colorThief = new ColorThief();
    let current = null, currentIndex = -1;

    function playCard(index) {
        const card = cards[index];
        cards.forEach(c => c.classList.remove("active"));
        card.classList.add("active");
        current = card; currentIndex = index;
        player.src = card.dataset.song; player.play();
        bgImage.style.opacity = "0.15";
        const img = card.querySelector("img");
        const updateBackground = () => {
            const palette = colorThief.getPalette(img, 2);
            background.style.background = `radial-gradient(circle at top, rgba(${palette[0][0]}, ${palette[0][1]}, ${palette[0][2]}, 0.22) 0%, rgba(${palette[1][0]}, ${palette[1][1]}, ${palette[1][2]}, 0.12) 45%, #050505 100%)`;
        };
        img.complete ? updateBackground() : img.onload = updateBackground;
    }

    cards.forEach((card, index) => {
        card.addEventListener("click", (e) => {
            if (e.target.closest(".download")) return;
            playCard(index);
        });
    });

    searchInput.addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase();
        cards.forEach(card => card.style.display = card.textContent.toLowerCase().includes(query) ? "flex" : "none");
    });

    homeButton.addEventListener("click", () => {
        player.pause(); player.src = "";
        cards.forEach(c => c.classList.remove("active"));
        background.style.background = "radial-gradient(circle at top,#222,#050505 70%)";
        bgImage.style.opacity = "0.65";
        window.scrollTo({ top: 0, behavior: "smooth" });
    });
</script>
</body>
</html>
