<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE CREATE • Game Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:#050505; color:#fff; overflow-x:hidden; }

        .bg-image { position: fixed; inset: 0; background: url("../BACKGROUND.jpg") no-repeat center center; background-size: cover; z-index: -4; opacity: 0.3; }
        
        header { position:fixed; top:0; left:0; width:100%; padding:22px 60px; display:flex; justify-content:space-between; align-items:center; backdrop-filter:blur(20px); background:rgba(0,0,0,.5); z-index:1000; }
        .logo a { color: #fff; text-decoration: none; font-weight: 800; cursor: pointer; }
        nav { display:flex; gap:35px; }
        nav a { color:white; text-decoration:none; font-weight:500; }

        .hero { padding-top:150px; text-align:center; padding-bottom:60px; }
        .hero h1 { font-size:85px; font-weight:900; background: linear-gradient(180deg, #fff, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .music { padding:0 60px 140px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { display:flex; align-items:center; gap:15px; padding:15px; background:rgba(255,255,255,.05); border-radius:15px; cursor:pointer; transition:.3s; }
        .card:hover { background:rgba(255,255,255,.1); }
        .card img { width:60px; height:60px; border-radius:10px; object-fit:cover; }
        .info h3 { font-size: 16px; }
        
        .download { margin-left: auto; text-decoration: none; color: #00E5FF; }
        
        .search { position:fixed; bottom:25px; left:50%; transform:translateX(-50%); width:min(700px,92%); }
        .search input { width:100%; padding:18px 22px; border-radius:50px; background:rgba(255,255,255,.1); border:none; color:white; }
    </style>
</head>
<body>

<div class="bg-image"></div>

<header>
    <div class="logo"><a href="../../index.html">WE <span>CREATE</span></a></div>
    <nav>
        <a href="../../index.html">Home</a>
        <a href="nocopyrightmusic.html">NO COPYRIGHT MUSIC</a>
    </nav>
</header>

<section class="hero">
    <h1>GAME<span>MUSIC</span></h1>
</section>

<section class="music">
    <div class="card" data-song="MUSIC/song1.mp3">
        <img src="COVER/cover1.jpg">
        <div class="info"><h3>Song 1</h3></div>
        <a class="download" href="MUSIC/song1.mp3" download>Download</a>
    </div>

    <div class="card" data-song="MUSIC/song2.mp3">
        <img src="COVER/cover2.jpg">
        <div class="info"><h3>Song 2</h3></div>
        <a class="download" href="MUSIC/song2.mp3" download>Download</a>
    </div>
    
    </section>

<div class="search">
    <input type="text" id="searchInput" placeholder="Search songs...">
</div>

<audio id="player"></audio>

<script>
    const player = document.getElementById("player");
    const cards = document.querySelectorAll(".card");
    
    cards.forEach(card => {
        card.addEventListener("click", () => {
            player.src = card.dataset.song;
            player.play();
        });
    });

    document.getElementById("searchInput").addEventListener("input", (e) => {
        const val = e.target.value.toLowerCase();
        cards.forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(val) ? "flex" : "none";
        });
    });
</script>

</body>
</html>
