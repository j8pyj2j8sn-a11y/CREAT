<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE • Game Music</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    html { scroll-behavior:smooth; }
    body { background:#050505; color:#fff; overflow-x:hidden; }

    /* Backgrounds */
    .bg-image { position:fixed; inset:0; background:url("BACKGROUND.jpg") no-repeat center center; background-size:cover; z-index:-4; opacity: 0.65; transition: opacity 0.8s ease; }
    .bg { position:fixed; inset:0; background:radial-gradient(circle at top,#222,#050505 70%); z-index:-3; opacity: 0.65; }

    /* Header */
    header { position:fixed; top:0; width:100%; padding:22px 60px; display:flex; justify-content:space-between; align-items:center; backdrop-filter:blur(20px); background:rgba(0,0,0,.18); z-index:1000; }
    .logo a { cursor:pointer; padding:8px 20px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:50px; text-decoration:none; color:#fff; font-weight:800; }
    .logo span { color:#00E5FF; }
    nav { display:flex; gap:35px; }
    nav a { color:white; text-decoration:none; font-size:14px; }

    /* Hero */
    .hero { padding:150px 0 60px; text-align:center; }
    .hero h4 { letter-spacing:5px; color:#00E5FF; font-size:14px; margin-bottom:20px; }
    .hero h1 { font-size:85px; font-weight:900; background:linear-gradient(180deg,#fafafa 0%,#1c1c1c 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .hero p { color:#c5c5c5; font-size:19px; margin-top:20px; }

    /* Music Section */
    .music { padding:0 60px 140px; max-width:900px; margin:auto; }
    .music h2 { font-size:28px; margin-bottom:25px; }
    .card { display:flex; align-items:center; gap:18px; padding:18px; margin-bottom:18px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:24px; cursor:pointer; transition:.35s; }
    .card:hover { background:rgba(255,255,255,.08); }
    .card img { width:75px; height:75px; border-radius:60px; object-fit:cover; }
    .info { flex:1; }
    .info h3 { font-size:21px; }
    .info p { color:#bfbfbf; font-size:14px; }
    .download { width:44px; height:44px; border-radius:50%; display:flex; justify-content:center; align-items:center; background:rgba(255,255,255,.08); color:white; text-decoration:none; }
    
    .search { position:fixed; bottom:25px; left:50%; transform:translateX(-50%); width:min(700px,92%); }
    .search input { width:100%; padding:18px 22px; border-radius:50px; border:none; background:rgba(255,255,255,.08); color:white; }
</style>
</head>
<body>

<div class="bg-image"></div>
<div class="bg"></div>

<header>
    <div class="logo"><a id="homeButton"><span>WE</span> CREATE</a></div>
    <nav>
        <a href="index.html">Home</a>
        <a href="nocopyrightmusic.html">NO COPYRIGHT MUSIC</a>
        <a href="https://ncs.io">NCS</a>
        <a href="nocopyright.html">Troll Wallet</a>
    </nav>
</header>

<section class="hero">
    <h4>DISCOVER • LISTEN • DOWNLOAD</h4>
    <h1>GAME MUSIC</h1>
    <p>Explore a Premium Collection of Immersive Background Tracks</p>
</section>

<section class="music">
    <h2>Latest Tracks</h2>
    <script>
        for(let i = 1; i <= 30; i++) {
            document.write(`
                <div class="card" data-song="WECREATE/GAMEMUSIC/MUSIC/song${i}.mp3">
                    <img src="WECREATE/GAMEMUSIC/COVER/cover${i}.jpg">
                    <div class="info"><h3>Song ${i}</h3><p>Game Soundtrack</p></div>
                    <a class="download" href="WECREATE/GAMEMUSIC/MUSIC/song${i}.mp3" download>↓</a>
                </div>
            `);
        }
    </script>
</section>

<div class="search"><input type="text" id="searchInput" placeholder="Search music..."></div>
<audio id="player"></audio>

<script>
    const player = document.getElementById("player");
    document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", (e) => {
            if (e.target.classList.contains('download')) return;
            player.src = card.dataset.song;
            player.play();
        });
    });
    document.getElementById("homeButton").addEventListener("click", () => {
        player.pause();
        player.src = "";
        window.scrollTo({ top: 0, behavior: "smooth" });
    });
    document.getElementById("searchInput").addEventListener("input", (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll(".card").forEach(c => c.style.display = c.textContent.toLowerCase().includes(val) ? "flex" : "none");
    });
</script>
</body>
</html>
