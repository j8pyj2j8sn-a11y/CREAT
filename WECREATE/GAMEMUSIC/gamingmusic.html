<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE • Game Music</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ... (Keep your existing CSS here) ... */
</style>
</head>
<body>
<div class="bg-image"></div>
<div class="bg"></div>

<header>
    <div class="logo">
        <a href="../../index.html">
            <span class="we-text">WE</span> <span>CREATE</span>
        </a>
    </div>
    <nav>
        <a href="../../index.html">Home</a>
        <a href="nocopyrightmusic.html">NO COPYRIGHT MUSIC</a>
    </nav>
</header>

<section class="hero">
    <h4>DISCOVER • LISTEN • DOWNLOAD</h4>
    <h1>GAME<span>MUSIC</span></h1>
</section>

<section class="music" id="musicContainer"></section>

<div class="search"><input type="text" id="searchInput" placeholder="Search music..."></div>
<audio id="player"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.4.0/color-thief.min.js"></script>
<script>
// --- EDIT YOUR 30 NAMES HERE ---
const songNames = [
    "Battle Theme", "Lobby Ambience", "Victory Song", "Main Menu", "Secret Level", 
    "Boss Fight", "Forest Zone", "Ice Cave", "Cyber City", "Retro Chase",
    "Song 11", "Song 12", "Song 13", "Song 14", "Song 15",
    "Song 16", "Song 17", "Song 18", "Song 19", "Song 20",
    "Song 21", "Song 22", "Song 23", "Song 24", "Song 25",
    "Song 26", "Song 27", "Song 28", "Song 29", "Song 30"
];

const container = document.getElementById("musicContainer");
songNames.forEach((name, i) => {
    let num = i + 1;
    container.innerHTML += `
        <div class="card" data-song="MUSIC/song${num}.mp3">
            <img src="COVER/cover${num}.jpg" crossorigin="anonymous">
            <div class="info"><h3>${name}</h3></div>
            <div class="equalizer"><span></span><span></span><span></span></div>
            <a class="download" href="MUSIC/song${num}.mp3" download onclick="event.stopPropagation()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path d="M12 3V14" stroke="#00F5FF" stroke-width="2.5" stroke-linecap="round"/><path d="M8.5 10.5L12 14L15.5 10.5" stroke="#00F5FF" stroke-width="2.5" stroke-linecap="round"/><path d="M5 18H19" stroke="#00F5FF" stroke-width="2.5" stroke-linecap="round"/></svg></a>
        </div>
    `;
});

const player = document.getElementById("player");
const cards = document.querySelectorAll(".card");
const background = document.querySelector(".bg");
const bgImage = document.querySelector(".bg-image"); 
const colorThief = new ColorThief();
let current = null;

function playCard(index){
    const card = cards[index];
    cards.forEach(c=>{ c.classList.remove("active"); c.style.boxShadow=""; });
    card.classList.add("active");
    current = card;
    player.src = card.dataset.song;
    player.play().catch(()=>{});
    bgImage.style.opacity = "0.15"; 
    const img = card.querySelector("img");
    const update = () => {
        const p = colorThief.getPalette(img, 2);
        card.style.boxShadow = `0 0 25px rgb(${p[0][0]}, ${p[0][1]}, ${p[0][2]}), 0 0 80px rgba(${p[0][0]}, ${p[0][1]}, ${p[0][2]}, 0.4)`;
        background.style.background = `radial-gradient(circle at top, rgba(${p[0][0]}, ${p[0][1]}, ${p[0][2]}, 0.22) 0%, #050505 100%)`;
    };
    img.complete ? update() : img.onload = update;
}

cards.forEach((card, i) => {
    card.onclick = (e) => {
        if(e.target.closest(".download")) return;
        if(current === card){
            player.paused ? player.play() : player.pause();
            card.classList.toggle("active");
        } else {
            playCard(i);
        }
    };
});

document.getElementById("searchInput").oninput = (e) => {
    const q = e.target.value.toLowerCase();
    cards.forEach((c, i) => c.style.display = songNames[i].toLowerCase().includes(q) ? "flex" : "none");
};
</script>
</body>
</html>
