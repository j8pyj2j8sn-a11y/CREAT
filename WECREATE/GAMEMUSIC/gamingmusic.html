<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE • Game Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
html{ scroll-behavior:smooth; }
body{ background:#050505; color:#fff; overflow-x:hidden; }

.bg-image { position: fixed; inset: 0; background: url("BACKGROUND.jpg") no-repeat center center; background-size: cover; z-index: -4; animation: atmosphericScale 2.2s cubic-bezier(0.16, 1, 0.3, 1) both; transition: opacity 0.8s ease; }
.bg{ position:fixed; inset:0; background:radial-gradient(circle at top,#222,#050505 70%); transition:1s; z-index:-3; opacity: 0.65; animation: atmosphericScale 2.2s cubic-bezier(0.16, 1, 0.3, 1) both; }

header{ position:fixed; top:0; left:0; width:100%; padding:22px 60px; display:flex; justify-content:space-between; align-items:center; backdrop-filter:blur(20px); background:rgba(0,0,0,.18); z-index:1000; }
.logo a { color: inherit; text-decoration: none; display: flex; align-items: center; padding: 8px 20px; background: rgba(255, 255, 255, .05); border: 1px solid rgba(255, 255, 255, .08); border-radius: 50px; cursor: pointer; transition: .3s; }
.logo a:hover { transform: translateY(-2px); box-shadow: 0 0 25px #00E5FF; }
.logo span{ color:#00E5FF; }

nav{ display:flex; gap:35px; }
nav a{ color:white; text-decoration:none; font-weight:500; }
nav a:hover{ color:#00E5FF; }

.hero{ padding:150px 0 60px; text-align:center; }
.hero h4{ letter-spacing:5px; color:#00E5FF; font-size:14px; margin-bottom:20px; }
.hero h1{ font-size:85px; font-weight:900; background: linear-gradient(180deg, #fafafa 0%, #1c1c1c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.music{ padding:0 60px 140px; }
.card{ display:flex; align-items:center; gap:18px; padding:18px; margin-bottom:18px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:24px; cursor:pointer; position:relative; transition:.3s; }
.card:hover{ transform:translateY(-3px); background:rgba(255,255,255,.08); }
.card img{ width:75px; height:75px; border-radius:60px; object-fit:cover; }

.info{ flex:1; }
.download{ width:44px; height:44px; border-radius:50%; display:flex; justify-content:center; align-items:center; background:rgba(255,255,255,.08); text-decoration: none; color: white; }
.search{ position:fixed; bottom:25px; left:50%; transform:translateX(-50%); width:min(700px,92%); }
.search input{ width:100%; padding:18px 22px; border-radius:50px; background:rgba(255,255,255,.08); border:none; color:white; font-size:17px; }
</style>
</head>

<body>

<div class="bg-image"></div>
<div class="bg"></div>

<header>
<div class="logo">
  <a href="index.html"><span>WE</span> <span>CREATE</span></a>
</div>
<nav>
    <a href="index.html">Home</a>
    <a href="nocopyrightmusic.html">NO COPYRIGHT MUSIC</a>
</nav>
</header>

<section class="hero">
<h4>DISCOVER • LISTEN • DOWNLOAD</h4>
<h1>GAME<span>MUSIC</span></h1>
</section>

<section class="music" id="musicContainer"></section>

<div class="search"><input type="text" id="searchInput" placeholder="Search music..."></div>
<audio id="player"></audio>

<script>
// --- EASILY EDIT SONG NAMES HERE ---
const songTitles = [
    "S1", "S2", "S3", "S4", "S5", "S6", "S7", "S8", "S9", "S10",
    "S11", "S12", "S13", "S14", "S15", "S16", "S17", "S18", "S19", "S20",
    "S21", "S22", "S23", "S24", "S25", "S26", "S27", "S28", "S29", "S30"
];

const container = document.getElementById("musicContainer");

// Generate cards
songTitles.forEach((title, i) => {
    const num = i + 1;
    container.innerHTML += `
      <div class="card" data-song="WECREATE/GAMEMUSIC/MUSIC/song${num}.mp3">
        <img src="WECREATE/GAMEMUSIC/COVER/cover${num}.jpg" crossorigin="anonymous">
        <div class="info"><h3>${title}</h3></div>
        <a class="download" href="WECREATE/GAMEMUSIC/MUSIC/song${num}.mp3" download>↓</a>
      </div>
    `;
});

// Logic for playback and search remains functional as per original
</script>
</body>
</html>
