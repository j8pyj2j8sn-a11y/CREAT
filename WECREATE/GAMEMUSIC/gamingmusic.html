<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE • Game Music</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
html{scroll-behavior:smooth;}
body{background:#050505;color:#fff;overflow-x:hidden;}
.bg-image {position: fixed;inset: 0;background: url("WECREATE/GAMEMUSIC/BACKGROUND.jpg") no-repeat center center;background-size: cover;z-index: -4;animation: atmosphericScale 2.2s cubic-bezier(0.16, 1, 0.3, 1) both;transition: opacity 0.8s ease;}
.bg{position:fixed;inset:0;background:radial-gradient(circle at top,#222,#050505 70%);transition:1s;z-index:-3;opacity: 0.65;}
header{position:fixed;top:0;left:0;width:100%;padding:22px 60px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);background:rgba(0,0,0,.18);z-index:1000;}
.logo{font-size:24px;font-weight:800;letter-spacing:2px;white-space:nowrap;}
.logo a{color:white;text-decoration:none;cursor:pointer;}
nav{display:flex;gap:35px;}
nav a{color:white;text-decoration:none;font-weight:500;}
.hero{padding-top:150px;text-align:center;padding-bottom:60px;}
.hero h1{font-size:85px;font-weight:900;background: linear-gradient(180deg,#fafafa 0%,#5a5a5a 100%);-webkit-background-clip: text;-webkit-text-fill-color: transparent;}
.music{padding:0 60px 140px;}
.card{display:flex;align-items:center;gap:18px;padding:18px;margin-bottom:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:24px;backdrop-filter:blur(20px);cursor:pointer;transition:.3s;}
.card:hover{background:rgba(255,255,255,.1);}
.card img{width:75px;height:75px;border-radius:60px;object-fit:cover;}
.info h3{font-size:18px;}
.download{margin-left:auto;text-decoration:none;color:white;padding:10px;background:rgba(255,255,255,.1);border-radius:50%;}
.search{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);width:min(700px,92%);}
.search input{width:100%;padding:18px 22px;border:none;border-radius:50px;background:rgba(255,255,255,.1);color:white;backdrop-filter:blur(20px);}
</style>
</head>

<body>
<div class="bg-image"></div>
<div class="bg"></div>

<header>
    <div class="logo"><a id="homeButton">WE <span>CREATE</span></a></div>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<section class="hero">
    <h1>GAME<span>MUSIC</span></h1>
</section>

<section class="music" id="musicContainer">
    <h2>Latest Tracks</h2>
</section>

<div class="search"><input type="text" id="searchInput" placeholder="Search music..."></div>
<audio id="player"></audio>

<script>
    // 1. ADD YOUR SONG NAMES HERE
    const songList = [
        "Song 1", "Song 2", "Song 3", "Song 4", "Song 5", 
        "Song 6", "Song 7", "Song 8", "Song 9", "Song 10",
        "Song 11", "Song 12", "Song 13", "Song 14", "Song 15",
        "Song 16", "Song 17", "Song 18", "Song 19", "Song 20",
        "Song 21", "Song 22", "Song 23", "Song 24", "Song 25",
        "Song 26", "Song 27", "Song 28", "Song 29", "Song 30"
    ];

    const container = document.getElementById('musicContainer');
    const player = document.getElementById('player');

    songList.forEach((name, index) => {
        const i = index + 1;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="WECREATE/GAMEMUSIC/COVER/cover${i}.jpg">
            <div class="info"><h3>${name}</h3></div>
            <a class="download" href="WECREATE/GAMEMUSIC/MUSIC/song${i}.mp3" download>↓</a>
        `;
        
        card.onclick = () => {
            player.src = `WECREATE/GAMEMUSIC/MUSIC/song${i}.mp3`;
            player.play();
        };
        container.appendChild(card);
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
        });
    });
</script>
</body>
</html>
