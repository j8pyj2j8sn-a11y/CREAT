<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE • Game Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* YOUR ORIGINAL PREMIUM DESIGN */
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
html{ scroll-behavior:smooth; }
body{ background:#050505; color:#fff; overflow-x:hidden; }
.bg-image { position: fixed; inset: 0; background: url("BACKGROUND.jpg") no-repeat center center; background-size: cover; z-index: -4; animation: atmosphericScale 2.2s cubic-bezier(0.16, 1, 0.3, 1) both; transition: opacity 0.8s ease; }
.bg{ position:fixed; inset:0; background:radial-gradient(circle at top,#222,#050505 70%); transition:1s; z-index:-3; opacity: 0.65; animation: atmosphericScale 2.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
header{ position:fixed; top:0; left:0; width:100%; padding:22px 60px; display:flex; justify-content:space-between; align-items:center; backdrop-filter:blur(20px); background:rgba(0,0,0,.18); z-index:1000; animation: premiumEntrance 1.4s cubic-bezier(0.16, 1, 0.3, 1) both; animation-delay: 0.1s; }
.logo{ font-size:24px; font-weight:800; letter-spacing:2px; white-space:nowrap; }
.logo a { color: inherit; text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 8px 20px; background: rgba(255, 255, 255, .05); border: 1px solid rgba(255, 255, 255, .08); border-radius: 50px; backdrop-filter: blur(20px); cursor: pointer; }
.logo span{ color:#00E5FF; }
nav{ display:flex; gap:35px; }
nav a{ color:white; text-decoration:none; font-weight:500; transition:.3s; }
nav a:hover{ color:#00E5FF; }
.hero{ padding-top:150px; text-align:center; padding-bottom:60px; }
.hero h1{ font-size:85px; font-weight:900; background: linear-gradient(180deg, #fafafa 0%, #111 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.music{ padding:0 60px 140px; }
.card{ display:flex; align-items:center; gap:18px; padding:18px; margin-bottom:18px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:24px; backdrop-filter:blur(20px); transition:.35s; cursor:pointer; position:relative; overflow:hidden; animation: premiumEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
.card:hover{ transform:translateY(-3px); background:rgba(255,255,255,.08); }
.card img{ width:75px; height:75px; border-radius:60px; object-fit:cover; }
.card.active{ border: 1px solid #00E5FF; }
.equalizer{ display:flex; gap:4px; opacity:0; }
.card.active .equalizer{ opacity:1; }
.download{ width:44px; height:44px; border-radius:50%; display:flex; justify-content:center; align-items:center; background:rgba(255,255,255,.08); color: white; text-decoration: none; }
.search{ position:fixed; bottom:25px; left:50%; transform:translateX(-50%); width:min(700px,92%); }
.search input{ width:100%; padding:18px 22px; border-radius:50px; background:rgba(255,255,255,.08); border:none; color:white; }
@keyframes premiumEntrance { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
@keyframes atmosphericScale { 0% { opacity: 0; transform: scale(1.12); } 100% { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>

<div class="bg-image"></div>
<div class="bg"></div>

<header>
    <div class="logo"><a>WE <span>CREATE</span></a></div>
    <nav><a href="index.html">Home</a><a href="nocopyrightmusic.html">NO COPYRIGHT MUSIC</a></nav>
</header>

<section class="hero"><h1>GAME <span>MUSIC</span></h1></section>
<section class="music" id="musicContainer"></section>

<div class="search"><input type="text" id="searchInput" placeholder="Search music..."></div>
<audio id="player"></audio>

<script>
// --- SIMPLIFIED EDITING: JUST ADD YOUR NAMES HERE ---
const songNames = [
    "Battle Theme", "Lobby Ambience", "Victory Song", "Main Menu", "Secret Level", 
    "Boss Fight", "Forest Zone", "Ice Cave", "Cyber City", "Retro Chase",
    "Song 11", "Song 12", "Song 13", "Song 14", "Song 15",
    "Song 16", "Song 17", "Song 18", "Song 19", "Song 20",
    "Song 21", "Song 22", "Song 23", "Song 24", "Song 25",
    "Song 26", "Song 27", "Song 28", "Song 29", "Song 30"
];

const container = document.getElementById("musicContainer");
const player = document.getElementById("player");

songNames.forEach((name, i) => {
    let num = i + 1;
    container.innerHTML += `
        <div class="card" onclick="playSong(this, 'MUSIC/song${num}.mp3')">
            <img src="COVER/cover${num}.jpg" crossorigin="anonymous">
            <div class="info"><h3>${name}</h3></div>
            <div class="equalizer"><span></span><span></span><span></span></div>
            <a class="download" href="MUSIC/song${num}.mp3" download onclick="event.stopPropagation()">↓</a>
        </div>
    `;
});

function playSong(element, file) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    element.classList.add('active');
    player.src = file;
    player.play();
}

document.getElementById("searchInput").oninput = (e) => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll(".card").forEach((card, i) => {
        card.style.display = songNames[i].toLowerCase().includes(q) ? "flex" : "none";
    });
};
</script>

</body>
</html>
