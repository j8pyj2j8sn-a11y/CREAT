<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE CREATE • Game Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }
        body { background: #050505; color: #fff; overflow-x: hidden; }

        /* Background Layers */
        .bg-image { position: fixed; inset: 0; background: url("BACKGROUND.jpg") no-repeat center center; background-size: cover; z-index: -4; animation: atmosphericScale 2.2s cubic-bezier(0.16, 1, 0.3, 1) both; transition: opacity 0.8s ease; }
        .bg { position: fixed; inset: 0; background: radial-gradient(circle at top, #222, #050505 70%); transition: 1s; z-index: -3; opacity: 0.65; animation: atmosphericScale 2.2s cubic-bezier(0.16, 1, 0.3, 1) both; }

        /* Header */
        header { position: fixed; top: 0; left: 0; width: 100%; padding: 22px 60px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(20px); background: rgba(0, 0, 0, .18); z-index: 1000; }
        .logo a { color: #fff; text-decoration: none; font-size: 24px; font-weight: 800; letter-spacing: 2px; padding: 8px 20px; background: rgba(255, 255, 255, .05); border: 1px solid rgba(255, 255, 255, .08); border-radius: 50px; cursor: pointer; box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }
        .logo span { color: #00E5FF; }
        nav { display: flex; gap: 35px; }
        nav a { color: white; text-decoration: none; font-weight: 500; }

        /* Hero */
        .hero { padding-top: 180px; text-align: center; padding-bottom: 60px; }
        .hero h1 { font-size: 85px; font-weight: 900; background: linear-gradient(180deg, #fafafa 0%, #4d4d4d 80%, #111 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Music Grid */
        .music { padding: 0 60px 140px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { display: flex; align-items: center; gap: 18px; padding: 18px; background: rgba(255, 255, 255, .05); border: 1px solid rgba(255, 255, 255, .08); border-radius: 24px; backdrop-filter: blur(20px); cursor: pointer; position: relative; overflow: hidden; transition: .3s; }
        .card:hover { transform: translateY(-3px); background: rgba(255, 255, 255, .08); }
        
        /* RGB Border Effect */
        .card::before { content: ""; position: absolute; inset: 0; padding: 1px; border-radius: 24px; background: linear-gradient(90deg, #00eaff, #4d7cff, #9b5cff, #ff2f92, #00eaff); background-size: 300%; animation: rgbBorder 6s linear infinite; -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; pointer-events: none; }
        
        .card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; transition: .4s; }
        .card.active img { animation: spinAlbum 12s linear infinite; box-shadow: 0 0 30px rgba(255, 255, 255, .15); }
        .card h3 { font-size: 18px; }

        /* Animations */
        @keyframes rgbBorder { 0% { background-position: 0%; } 100% { background-position: 300%; } }
        @keyframes spinAlbum { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes atmosphericScale { 0% { opacity: 0; transform: scale(1.12); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="bg"></div>

    <header>
        <div class="logo"><a href="index.html">WE<span>CREATE</span></a></div>
        <nav><a href="index.html">Home</a></nav>
    </header>

    <section class="hero">
        <h1>GAME MUSIC</h1>
    </section>

    <section class="music" id="musicGrid"></section>

    <audio id="player"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.4.0/color-thief.min.js"></script>
    <script>
        const musicGrid = document.getElementById('musicGrid');
        const player = document.getElementById('player');
        const bg = document.querySelector('.bg');
        const colorThief = new ColorThief();

        for (let i = 1; i <= 30; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="covers/cover${i}.jpg" crossorigin="anonymous"><h3>Song ${i}</h3>`;
            
            card.onclick = () => {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                player.src = `songs/song${i}.mp3`;
                player.play();
                
                const img = card.querySelector('img');
                if (img.complete) {
                    const palette = colorThief.getPalette(img, 2);
                    bg.style.background = `radial-gradient(circle at top, rgba(${palette[0].join(',')}, 0.3), #050505 70%)`;
                }
            };
            musicGrid.appendChild(card);
        }
    </script>
</body>
</html>
