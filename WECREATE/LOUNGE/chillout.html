<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOUNGE MUSIC</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --silver-border: 1px solid rgba(192, 192, 192, 0.6); }
        
        body { 
            margin: 0; background: #050505; color: white; 
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; 
        }

        /* --- BACKGROUND SETTINGS FROM ATTACHED CODE --- */
        .bg-image { position: fixed; inset: 0; background: url("BACKGROUND.jpg") no-repeat center center; background-size: cover; z-index: -4; animation: atmosphericScale 2.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .bg { position: fixed; inset: 0; background: radial-gradient(circle at top,#222,#050505 70%); z-index: -3; opacity: 0.65; animation: atmosphericScale 2.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
        
        /* Titanium Gradient Overlay */
        body::before {
            content: ""; position: fixed; inset: 0; pointer-events: none; z-index: -2;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(200, 200, 200, 0.05) 50%, rgba(100, 100, 100, 0.1) 100%);
        }

        /* --- ANIMATIONS --- */
        @keyframes atmosphericScale { 0% { opacity: 0; transform: scale(1.12); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes premiumEntrance { 0% { opacity: 0; transform: translateY(40px) scale(0.98); filter: blur(8px); } 100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }
        
        /* UI Elements with Entrance Animation */
        nav, h1, #disc, .glass-bar { animation: premiumEntrance 1.4s cubic-bezier(0.16, 1, 0.3, 1) both; }

        /* UI Styles */
        nav { width: 100%; padding: 50px 80px; position: absolute; top: 0; box-sizing: border-box; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; font-weight: 300; letter-spacing: 3px; font-size: 20px; }
        h1 { font-size: 120px; margin: 0; text-transform: uppercase; letter-spacing: -5px; }
        #disc { width: 250px; height: 250px; border-radius: 50%; background: url('COVER/cover1.jpg') center/cover; border: 4px solid #333; transition: all 0.5s ease; margin: 50px 0; }
        .playing { animation: rotate 8s linear infinite; border-color: #fff; box-shadow: 0 0 40px rgba(255,255,255,0.2); }
        .glass-bar { width: auto; max-width: 90%; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 15px 40px; border-radius: 50px; display: flex; align-items: center; justify-content: center; gap: 40px; position: fixed; bottom: 40px; }
        .btn-tablet { height: 50px; min-width: 70px; border-radius: 25px; background: rgba(0,0,0,0.3); border: var(--silver-border); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="bg"></div>

    <nav><a href="../../index.html">WE CREATE</a></nav>
    <h1>LOUNGE MUSIC</h1>

    <div id="disc"></div>

    <div class="glass-bar">
        <button class="btn-tablet" onclick="prevSong()">&lt;</button>
        <button class="btn-tablet" id="mainPlayBtn" onclick="togglePlay()">▶</button>
        <button class="btn-tablet" onclick="nextSong()">&gt;</button>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const disc = document.getElementById('disc');
        const playBtn = document.getElementById('mainPlayBtn');
        const audio = document.getElementById('audioPlayer');
        let currentTrack = 1;

        function selectSong(i) {
            currentTrack = i;
            const coverPath = `COVER/cover${i}.jpg`;
            audio.src = `MUSIC/music${i}.mp3`;
            disc.style.backgroundImage = `url('${coverPath}')`;
            audio.play();
            disc.classList.add('playing');
            playBtn.innerText = "||";
        }

        function togglePlay() {
            if (audio.paused) { 
                audio.play(); 
                disc.classList.add('playing'); 
                playBtn.innerText = "||"; 
            } else { 
                audio.pause(); 
                disc.classList.remove('playing'); 
                playBtn.innerText = "▶"; 
            }
        }
        
        function nextSong() { currentTrack = (currentTrack >= 50) ? 1 : currentTrack + 1; selectSong(currentTrack); }
        function prevSong() { currentTrack = (currentTrack <= 1) ? 50 : currentTrack - 1; selectSong(currentTrack); }
    </script>
</body>
</html>
