<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOUNGE MUSIC</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --silver-border: 1px solid rgba(192, 192, 192, 0.6); --bg-color: #050505; }
        
        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            background-image: url('chillout.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            background-repeat: no-repeat;
            color: white; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        /* The dynamic background layer (Album Art) */
        #bg-dynamic { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-size: cover; 
            background-position: center; 
            filter: blur(60px) brightness(0.3); 
            opacity: 0; 
            z-index: -1; 
            transition: opacity 1s ease; 
        }

        nav { width: 100%; padding: 50px 80px; position: absolute; top: 0; box-sizing: border-box; }
        nav a { color: white; text-decoration: none; font-weight: 300; letter-spacing: 3px; font-size: 20px; }

        h1 { font-size: 120px; margin: 0; text-transform: uppercase; letter-spacing: -5px; }

        #disc { width: 250px; height: 250px; border-radius: 50%; background: url('COVER/cover1.jpg') center/cover; border: 4px solid #333; transition: all 0.5s ease; margin: 50px 0; }
        .playing { animation: rotate 8s linear infinite; border-color: #fff; box-shadow: 0 0 40px rgba(255,255,255,0.2); }

        .glass-bar { width: auto; max-width: 90%; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 15px 40px; border-radius: 50px; display: flex; align-items: center; justify-content: center; gap: 40px; position: fixed; bottom: 40px; }
        .btn-tablet { height: 50px; min-width: 70px; border-radius: 25px; background: rgba(0,0,0,0.3); border: var(--silver-border); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; transition: 0.3s; }
        .btn-tablet:hover { background: rgba(255,255,255,0.1); }

        #playlist { position: fixed; bottom: -100%; width: 100%; height: 60%; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(40px); border-top: 1px solid rgba(255,255,255,0.2); border-radius: 40px 40px 0 0; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); padding: 20px; overflow-y: auto; z-index: 100; }
        #playlist.active { bottom: 0; }
        .handle { width: 50px; height: 5px; background: #fff; margin: 10px auto 30px; border-radius: 5px; cursor: pointer; }
        
        .song-item { display: flex; align-items: center; gap: 20px; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .song-cover { width: 60px; height: 60px; border-radius: 8px; background-size: cover; background-position: center; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="bg-dynamic"></div>
    <nav><a href="../../index.html">WE CREATE</a></nav>
    <h1>LOUNGE MUSIC</h1>

    <div id="disc"></div>

    <div class="glass-bar">
        <button class="btn-tablet" onclick="togglePlaylist()">≡</button>
        <button class="btn-tablet" onclick="prevSong()">&lt;</button>
        <button class="btn-tablet" id="mainPlayBtn" onclick="togglePlay()">▶</button>
        <button class="btn-tablet" onclick="nextSong()">&gt;</button>
        <button class="btn-tablet">↓</button>
    </div>

    <audio id="audioPlayer"></audio>

    <div id="playlist">
        <div class="handle" onclick="togglePlaylist()"></div>
        <div id="song-list-container"></div>
    </div>

    <script>
        const disc = document.getElementById('disc');
        const playBtn = document.getElementById('mainPlayBtn');
        const audio = document.getElementById('audioPlayer');
        const container = document.getElementById('song-list-container');
        const bgDynamic = document.getElementById('bg-dynamic');
        let currentTrack = 1;

        audio.src = `MUSIC/music${currentTrack}.mp3`;
        bgDynamic.style.backgroundImage = `url('COVER/cover${currentTrack}.jpg')`;

        audio.addEventListener('ended', () => {
            disc.classList.remove('playing');
            playBtn.innerText = "▶";
            bgDynamic.style.opacity = "0";
        });

        for(let i=1; i<=50; i++) {
            container.innerHTML += `
                <div class="song-item" onclick="selectSong(${i})">
                    <div class="song-cover" style="background-image: url('COVER/cover${i}.jpg')"></div>
                    <div style="color:white; font-weight:bold;">MUSIC ${i}</div>
                </div>`;
        }

        function selectSong(i) {
            currentTrack = i;
            const coverPath = `COVER/cover${i}.jpg`;
            audio.src = `MUSIC/music${i}.mp3`;
            disc.style.backgroundImage = `url('${coverPath}')`;
            bgDynamic.style.backgroundImage = `url('${coverPath}')`;
            
            audio.play();
            disc.classList.add('playing');
            bgDynamic
