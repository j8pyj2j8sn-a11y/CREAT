<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE • Game Music</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
html{ scroll-behavior:smooth; }
body{ background:#050505; color:#fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
.bg-image { position: fixed; inset: 0; background: url("chillout.jpg") no-repeat center center; background-size: cover; z-index: -4; transition: opacity 0.8s ease; opacity: 0.15; }
.bg{ position:fixed; inset:0; transition:1.5s ease; z-index:-3; opacity: 0.8; }
header{ width:100%; padding:20px 5%; display:flex; justify-content:space-between; align-items:center; backdrop-filter:blur(10px); background:rgba(0,0,0,.2); }
.logo{ font-size: 1.2rem; font-weight:800; }
.hero{ padding: 80px 20px 40px; text-align:center; }
.hero h1{ font-size: clamp(2.5rem, 8vw, 5rem); font-weight:900; line-height:1; }
.hero h1 span{ display:block; color:#00E5FF; }
.music{ width: 90%; max-width: 450px; padding-bottom: 100px; }
.card{ width: 100%; padding: 25px; display:flex; flex-direction:column; align-items:center; gap:20px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:32px; backdrop-filter:blur(20px); position:relative; }
.card img{ width: 100%; aspect-ratio: 1/1; border-radius: 20px; object-fit:cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.card.active img{ animation:spinAlbum 12s linear infinite; }
@keyframes spinAlbum{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }
.controls { display: flex; gap: 20px; align-items: center; }
.btn { width: 55px; height: 55px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; color: #fff; font-size: 1.2rem; }
.btn:hover { background: #fff; color: #000; }
.play-btn { width: 70px; height: 70px; background: #fff; color: #000; font-weight: bold; }
.download{ padding: 12px 30px; border-radius: 50px; background: rgba(255,255,255,.1); text-decoration: none; color: white; font-weight: 600; font-size: 0.9rem; transition: .3s; }
.download:hover{ background:#fff; color:black; }
</style>
</head>
<body>
<div class="bg-image"></div>
<div class="bg" id="dynamicBg"></div>

<header>
    <div class="logo">WE<span>CREATE</span></div>
</header>

<section class="hero">
    <h1>LOUNGE<span>MUSIC</span></h1>
</section>

<section class="music">
    <div class="card" id="mainCard" data-song="MUSIC/song1.mp3">
        <img src="COVER/cover1.jpg" id="albumArt" crossorigin="anonymous">
        <h3 id="songTitle">Battle Theme</h3>
        <div class="controls">
            <button class="btn" onclick="skip(-10)">«</button>
            <button class="btn play-btn" id="playBtn" onclick="togglePlay()">PLAY</button>
            <button class="btn" onclick="skip(10)">»</button>
        </div>
        <a class="download" href="MUSIC/song1.mp3" download>DOWNLOAD</a>
    </div>
</section>

<audio id="player"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.4.0/color-thief.min.js"></script>
<script>
const player = document.getElementById("player");
const card = document.getElementById("mainCard");
const playBtn = document.getElementById("playBtn");
const albumArt = document.getElementById("albumArt");
const dynamicBg = document.getElementById("dynamicBg");
const colorThief = new ColorThief();

function updateColors() {
    if (albumArt.complete) {
        const rgb = colorThief.getColor(albumArt);
        dynamicBg.style.background = `radial-gradient(circle at center, rgb(${rgb[0]},${rgb[1]},${rgb[2]}) 0%, #050505 80%)`;
    }
}

function togglePlay() {
    if (player.paused) {
        player.src = card.dataset.song;
        player.play();
        playBtn.innerText = "PAUSE";
        card.classList.add("active");
        updateColors();
    } else {
        player.pause();
        playBtn.innerText = "PLAY";
        card.classList.remove("active");
        dynamicBg.style.background = "transparent";
    }
}

function skip(seconds) { player.currentTime += seconds; }

albumArt.onload = updateColors;
</script>
</body>
</html>
