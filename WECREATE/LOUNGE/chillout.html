<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LOUNGE MUSIC</title>
    <style>
        body { margin: 0; background: #050505; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
        #bg-dynamic { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(60px) brightness(0.3); opacity: 0; z-index: -1; transition: opacity 0.8s; }
        #disc { width: 250px; height: 250px; border-radius: 50%; background: #333; border: 4px solid #333; margin: 50px 0; }
        .glass-bar { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 15px; border-radius: 50px; display: flex; gap: 15px; }
        .btn { padding: 10px 20px; border-radius: 20px; cursor: pointer; border: none; background: #444; color: white; }
    </style>
</head>
<body>
    <div id="bg-dynamic"></div>
    <h1>LOUNGE MUSIC</h1>
    <div id="disc"></div>
    <div class="glass-bar">
        <button class="btn" onclick="togglePlay()" id="playBtn">PLAY</button>
        <button class="btn" onclick="nextSong()">NEXT</button>
        <a id="downBtn" href="#" download class="btn" style="text-decoration:none;">DOWNLOAD</a>
    </div>
    <audio id="audioPlayer"></audio>

    <script>
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const downBtn = document.getElementById('downBtn');
        const bg = document.getElementById('bg-dynamic');
        let currentTrack = 1;

        function selectSong(i) {
            currentTrack = i;
            // UPDATE: Paths are relative to your html file
            const mPath = "MUSIC/music" + i + ".mp3";
            const cPath = "COVER/cover" + i + ".jpg";
            
            console.log("Loading: " + mPath); // LOOK AT THIS IN F12 CONSOLE
            
            audio.src = mPath;
            downBtn.href = mPath;
            bg.style.backgroundImage = "url('" + cPath + "')";
            
            audio.play().then(() => {
                playBtn.innerText = "PAUSE";
                bg.style.opacity = "0.6";
            }).catch(e => {
                console.error("Browser blocked audio or file not found: " + e);
                alert("Cannot play! Check Console (F12) for 404 errors.");
            });
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "PAUSE";
                bg.style.opacity = "0.6";
            } else {
                audio.pause();
                playBtn.innerText = "PLAY";
                bg.style.opacity = "0";
            }
        }
        
        function nextSong() { selectSong(currentTrack >= 50 ? 1 : currentTrack + 1); }
    </script>
</body>
</html>
