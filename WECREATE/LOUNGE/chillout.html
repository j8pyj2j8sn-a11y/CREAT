<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOUNGE MUSIC</title>
<style>
    /* --- NEW BACKGROUND & ANIMATION EFFECTS --- */
    .bg-image { position: fixed; inset: 0; background: url("BACKGROUND.jpg") no-repeat center center; background-size: cover; z-index: -4; animation: atmosphericScale 2.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .bg { position: fixed; inset: 0; background: radial-gradient(circle at top,#222,#050505 70%); z-index: -3; opacity: 0.65; animation: atmosphericScale 2.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
    
    /* Titanium Gradient Overlay */
    body::before { content: ""; position: fixed; inset: 0; pointer-events: none; z-index: -2; background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0.2) 100%); }

    @keyframes atmosphericScale { 0% { opacity: 0; transform: scale(1.12); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes premiumEntrance { 0% { opacity: 0; transform: translateY(40px) scale(0.98); filter: blur(8px); } 100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }

    /* Apply entrance to your UI */
    nav, h1, #disc, .glass-bar, #playlist { animation: premiumEntrance 1.4s cubic-bezier(0.16, 1, 0.3, 1) both; }

    /* --- YOUR EXISTING CSS --- */
    /* I removed the 'background' from body so it doesn't cover the new layers */
    body { margin: 0; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    
    /* ADD ALL YOUR ORIGINAL CSS CLASSES BELOW HERE */
    :root { --glass: rgba(255, 255, 255, 0.05); --silver-border: 1px solid rgba(192, 192, 192, 0.6); }
    nav { width: 100%; padding: 50px 80px; position: absolute; top: 0; box-sizing: border-box; }
    h1 { font-size: 120px; margin: 0; text-transform: uppercase; letter-spacing: -5px; text-align: center; margin-top: 150px; }
    #disc { width: 250px; height: 250px; border-radius: 50%; background: url('COVER/cover1.jpg') center/cover; border: 4px solid #333; margin: 50px auto; transition: all 0.5s ease; }
    .playing { animation: rotate 8s linear infinite; border-color: #fff; box-shadow: 0 0 40px rgba(255,255,255,0.2); }
    .glass-bar { width: auto; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 15px 40px; border-radius: 50px; display: flex; gap: 40px; position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); }
    .btn-tablet { height: 50px; min-width: 70px; border-radius: 25px; background: rgba(0,0,0,0.3); border: var(--silver-border); color: #fff; cursor: pointer; }
    #playlist { position: fixed; bottom: -100%; width: 100%; height: 60%; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(40px); border-top: 1px solid rgba(255,255,255,0.2); transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); z-index: 100; }
    #playlist.active { bottom: 0; }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="bg"></div>

    <nav><a href="../../index.html">WE CREATE</a></nav>
    <h1>LOUNGE MUSIC</h1>
    <div id="disc"></div>
    <div class="glass-bar">
        <button class="btn-tablet" onclick="togglePlaylist()">≡</button>
        <button class="btn-tablet" onclick="prevSong()">&lt;</button>
        <button class="btn-tablet" id="mainPlayBtn" onclick="togglePlay()">▶</button>
        <button class="btn-tablet" onclick="nextSong()">&gt;</button>
    </div>
    <audio id="audioPlayer"></audio>
    <div id="playlist">
        <div class="handle" onclick="togglePlaylist()"></div>
        <div id="song-list-container"></div>
    </div>

    <script>
        // ADD YOUR EXISTING JS FUNCTIONS HERE
        function togglePlaylist() { document.getElementById('playlist').classList.toggle('active'); }
        function togglePlay() { /* Your logic */ }
        function nextSong() { /* Your logic */ }
        function prevSong() { /* Your logic */ }
    </script>
</body>
</html>
