<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WE CREATE • Game Music</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    body { 
        background:#050505; color:#fff; min-height: 100vh; 
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        overflow-x: hidden; padding: 20px;
    }
    .bg-image { position: fixed; inset: 0; background: url("chillout.jpg") no-repeat center center; background-size: cover; z-index: -4; opacity: 0.15; }
    .bg { position:fixed; inset:0; transition:1.5s ease; z-index:-3; opacity: 0.6; }

    /* Responsive Container */
    .container { 
        width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; 
    }
    .hero { text-align:center; margin-bottom: 20px; }
    .hero h1 { font-size: clamp(2rem, 6vw, 3rem); font-weight:900; line-height:1; }
    .hero h1 span { color:#00E5FF; display: block; }

    /* Card sizing adjusted for landscape height */
    .card { 
        width: 100%; padding: 20px; display:flex; flex-direction:column; align-items:center; gap:15px; 
        background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); 
        border-radius:24px; backdrop-filter:blur(15px);
    }
    .card img { 
        width: 140px; height: 140px; border-radius: 20px; object-fit:cover; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
    }
    .card.active img { animation:spinAlbum 12s linear infinite; }
    @keyframes spinAlbum{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }
    
    .controls { display: flex; gap: 15px; align-items: center; }
    .btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; transition: 0.3s; }
    .btn:hover { background: #fff; color: #000; }
    .play-btn { width: 65px; height: 65px; background: #fff; color: #000; font-weight: bold; }
    .download { padding: 10px 25px; border-radius: 50px; background: rgba(255,255,255,.05); text-decoration: none; color: #fff; font-size: 0.8rem; transition: .3s; }
    .download:hover { background:#fff; color:black; }

    /* Landscape specific fix */
    @media (orientation: landscape) and (max-height: 500px) {
        body { justify-content: flex-start; padding-top: 10px; }
        .hero { display: none; }
        .card { flex-direction: row; gap: 20px; padding: 15px; }
        .card img { width: 80px; height: 80px; }
    }
</style>
</head>
<body>
<div class="bg-image"></div>
<div class="bg" id="dynamicBg"></div>

<div class="container">
    <section class="hero">
        <h1>LOUNGE<span>MUSIC</span></h1>
    </section>

    <div class="card" id="mainCard" data-song="MUSIC/song1.mp3">
        <img src="COVER/cover1.jpg" id="albumArt" crossorigin="anonymous">
        <div style="text-align:center">
            <h3 id="songTitle">Battle Theme</h3>
            <div class="controls" style="margin-top:15px">
                <button class="btn" onclick="skip(-10)">«</button>
                <button class="btn play-btn" id="playBtn" onclick="togglePlay()">PLAY</button>
                <button class="btn" onclick="skip(10)">»</button>
            </div>
        </div>
        <a class="download" href="MUSIC/song1.mp3" download>DOWNLOAD</a>
    </div>
</div>

<audio id="player"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.4.0/color-thief.min.js"></script>
<script>
const player = document.getElementById("player");
const card = document.getElementById("mainCard");
const playBtn = document.getElementById("playBtn");
const albumArt = document.getElementById("albumArt");
const dynamicBg = document.getElementById("dynamicBg");
const colorThief = new ColorThief();

function updateColors() {
    if (albumArt.complete) {
        const rgb = colorThief.getColor(albumArt);
        dynamicBg.style.background = `radial-gradient(circle at center, rgb(${rgb[0]},${rgb[1]},${rgb[2]}) 0%, #050505 70%)`;
    }
}

function togglePlay() {
    if (player.paused) {
        player.src = card.dataset.song;
        player.play();
        playBtn.innerText = "PAUSE";
        card.classList.add("active");
        updateColors();
    } else {
        player.pause();
        playBtn.innerText = "PLAY";
        card.classList.remove("active");
        dynamicBg.style.background = "transparent";
    }
}

function skip(seconds) { player.currentTime += seconds; }
</script>
</body>
</html>
