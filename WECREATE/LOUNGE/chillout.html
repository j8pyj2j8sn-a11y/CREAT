<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE CREATE • Game Music</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* Reset and Base Styles */
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body{ background:#050505; color:#fff; overflow-x:hidden; }

/* Existing Atmospheric Styles */
.bg-image { position: fixed; inset: 0; background: url("chillout.jpg") no-repeat center center; background-size: cover; z-index: -4; transition: opacity 0.8s ease; }
.bg{ position:fixed; inset:0; background:radial-gradient(circle at top,#222,#050505 70%); transition:1s; z-index:-3; opacity: 0.65; }

/* --- PREMIUM LIQUID GLASS COMPONENTS --- */
.controls-container { display: flex; align-items: center; gap: 15px; margin-top: 15px; }

.glass-btn {
    width: 45px; height: 45px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: 0.3s; color: white;
    font-size: 1.2rem;
}
.glass-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.1); }

.progress-container { flex: 1; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; cursor: pointer; }
#progress-bar { height: 100%; width: 0%; background: #00E5FF; box-shadow: 0 0 10px #00E5FF; transition: width 0.1s linear; }

/* Updated Card Styles */
.card { display: flex; flex-direction: column; padding: 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; backdrop-filter: blur(15px); margin-bottom: 20px; position: relative; width: 350px; }
.card-top { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
.card img { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; }
.info { flex: 1; }
</style>
</head>
<body>

<section class="music" id="musicContainer">
    <div class="card" id="activeCard" data-song="MUSIC/song1.mp3">
        <div class="card-top">
            <button class="glass-btn" onclick="changeTrack(-1)">⏮</button>
            <img src="COVER/cover1.jpg" id="coverImage" crossorigin="anonymous">
            <div class="info"><h3 id="trackTitle">Battle Theme</h3></div>
            <a class="download" href="MUSIC/song1.mp3" id="downloadLink" download>↓</a>
            <button class="glass-btn" onclick="changeTrack(1)">⏭</button>
        </div>
        
        <div class="controls-container">
            <div class="progress-container" id="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>
    </div>
</section>

<audio id="player"></audio>

<script>
const player = document.getElementById("player");
const progressBar = document.getElementById("progress-bar");
const progressContainer = document.getElementById("progress-container");

// Example track list
const tracks = [
    { title: "Battle Theme", src: "MUSIC/song1.mp3", cover: "COVER/cover1.jpg" },
    { title: "Menu Theme", src: "MUSIC/song2.mp3", cover: "COVER/cover2.jpg" }
];
let currentIndex = 0;

// Update Progress Bar
player.addEventListener("timeupdate", () => {
    if (player.duration) {
        const percent = (player.currentTime / player.duration) * 100;
        progressBar.style.width = percent + "%";
    }
});

// Click to seek
progressContainer.addEventListener("click", (e) => {
    const width = progressContainer.clientWidth;
    const clickX = e.offsetX;
    player.currentTime = (clickX / width) * player.duration;
});

// Navigation Logic
function changeTrack(direction) {
    currentIndex += direction;
    
    // Loop index if out of bounds
    if (currentIndex < 0) currentIndex = tracks.length - 1;
    if (currentIndex >= tracks.length) currentIndex = 0;

    // Load new track
    const track = tracks[currentIndex];
    player.src = track.src;
    document.getElementById("trackTitle").innerText = track.title;
    document.getElementById("coverImage").src = track.cover;
    document.getElementById("downloadLink").href = track.src;
    
    player.play();
}
</script>
</body>
</html>
